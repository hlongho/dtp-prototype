<!doctype html>
<html lang="vi" data-theme="light">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Prototype CRM Nam Phong — Salesforce</title>
<style>
:root{
  --sf-blue:#0176d3; --sf-blue-d:#014486; --sf-blue-l:#eef4ff;
  --ink:#181818; --ink-2:#5c5c5c; --ink-3:#747474;
  --bg:#f3f3f3; --card:#ffffff; --line:#e5e5e5; --line-2:#d8d8d8;
  --ok:#2e844a; --ok-bg:#ebf7ee; --warn:#8c4b02; --warn-bg:#fef1e7; --warn-line:#fe9339;
  --err:#ba0517; --err-bg:#fdecee; --err-line:#ea001e;
  --path-todo:#e5e5e5; --path-done:#0176d3; --path-current:#014486;
  --nav:#f8fafb;
  --shadow:0 2px 4px rgba(0,0,0,.07);
  --radius:.4rem;
}
:root[data-theme="light"]{ --ink:#181818; --ink-2:#5c5c5c; --ink-3:#747474; --bg:#f3f3f3;
  --card:#ffffff; --line:#e5e5e5; --line-2:#d8d8d8; --nav:#f8fafb; --sf-blue-l:#eef4ff;
  --ok-bg:#ebf7ee; --warn-bg:#fef1e7; --err-bg:#fdecee; --shadow:0 2px 4px rgba(0,0,0,.07);}

*{box-sizing:border-box}
body{margin:0;font-family:"Helvetica Neue",Arial,"Segoe UI",sans-serif;
  background:var(--bg);color:var(--ink);font-size:13px;line-height:1.4;-webkit-font-smoothing:antialiased}
button{font-family:inherit;cursor:pointer}
a{color:var(--sf-blue);text-decoration:none}
a:hover{text-decoration:underline}

/* ---------- Layout ---------- */
.app{display:grid;grid-template-columns:290px 1fr;height:100vh;overflow:hidden;transition:grid-template-columns .22s ease}
.app.nav-hidden{grid-template-columns:0 1fr}
.app.nav-hidden .navigator{transform:translateX(-100%)}

/* ---------- Prototype navigator (left, not part of SF) ---------- */
.navigator{background:#0b1a2b;color:#cfe0f0;overflow-y:auto;border-right:1px solid #06121f;transition:transform .22s ease}
.backdrop{display:none}
@media(max-width:820px){
  .app{grid-template-columns:1fr}
  .navigator{position:fixed;top:0;left:0;bottom:0;width:280px;z-index:60;box-shadow:6px 0 24px rgba(0,0,0,.4)}
  .app.nav-hidden .navigator{transform:translateX(-100%)}
  .backdrop{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:55}
  .app:not(.nav-hidden) .backdrop{display:block}
}
.nav-brand{padding:16px 16px 12px;position:sticky;top:0;background:#0b1a2b;z-index:2;border-bottom:1px solid #16334f}
.nav-brand h1{font-size:14px;margin:0 0 2px;color:#fff;letter-spacing:.2px}
.nav-brand p{margin:0;font-size:11px;color:#7fa8cf}
.nav-hint{font-size:11px;color:#9ed0ff;background:#12334f;border-radius:5px;padding:7px 9px;margin-top:9px;line-height:1.35}
.nav-group{font-size:10.5px;text-transform:uppercase;letter-spacing:.09em;color:#5f86ac;padding:14px 16px 5px;font-weight:700}
.nav-item{display:block;width:100%;text-align:left;border:0;background:transparent;color:#cfe0f0;
  padding:7px 16px 7px 22px;font-size:12.5px;border-left:3px solid transparent}
.nav-item:hover{background:#12263c;color:#fff}
.nav-item.active{background:#0176d3;color:#fff;border-left-color:#9ed0ff;font-weight:600}
.nav-item .dept{display:block;font-size:10px;color:#7fa8cf;margin-top:1px}
.nav-item.active .dept{color:#dbecff}
.nav-item.sub{padding-left:30px;font-size:12px}
.nav-item.sub .ni-label{color:#a9c6e2}
.nav-item.active.sub .ni-label{color:#fff}
.ni-row{display:flex;align-items:center;gap:6px;justify-content:space-between}
.ni-label{flex:1}
.tag{font-size:8.5px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;
  padding:1px 5px;border-radius:3px;white-space:nowrap;flex-shrink:0}
.t-list{background:#0a6b52;color:#c8f4e4}
.t-record{background:#1f3a52;color:#9ec7ea}
.t-custom{background:#6a3b8f;color:#e9d3ff}
.t-flow{background:#8a5a00;color:#ffe0a3}
.nav-item.active .tag{filter:brightness(1.15)}

/* ---------- Salesforce workspace ---------- */
.sf{display:flex;flex-direction:column;height:100vh;overflow:hidden}

/* Global header */
.g-header{background:var(--sf-blue);display:flex;align-items:center;gap:10px;padding:6px 12px;flex-shrink:0}
.g-burger{background:none;border:0;color:#fff;font-size:16px;width:32px;height:32px;border-radius:5px;opacity:.92;flex-shrink:0}
.g-burger:hover{background:rgba(255,255,255,.15)}
.g-fav{background:none;border:0;color:#fff;font-size:16px;flex-shrink:0}
.g-fav:hover{background:rgba(255,255,255,.15)}
.g-gear,.g-help{font-size:15px;font-weight:700}
.g-bell{position:relative}
.g-bell:after{content:"";position:absolute;top:4px;right:5px;width:8px;height:8px;background:#ff5d2b;border-radius:50%;border:2px solid var(--sf-blue)}
.waffle{display:grid;grid-template-columns:repeat(3,4px);grid-gap:2px;padding:8px;border-radius:5px;flex-shrink:0}
.waffle span{width:4px;height:4px;background:#fff;border-radius:1px;opacity:.9}
.waffle:hover{background:rgba(255,255,255,.15)}
.g-search{flex:1;max-width:640px;background:#fff;border-radius:16px;display:flex;align-items:center;
  gap:8px;padding:5px 14px;color:#747474;position:relative}
.g-search svg{flex-shrink:0}
.g-search input{flex:1;border:0;outline:none;background:transparent;font-size:13px;color:#181818;font-family:inherit}
.g-search input::placeholder{color:#747474}
#search-dd{position:absolute;top:calc(100% + 6px);left:0;right:0;background:var(--card);
  border:1px solid var(--line);border-radius:8px;box-shadow:0 8px 30px rgba(0,0,0,.28);
  z-index:110;max-height:64vh;overflow:auto;display:none;padding:6px}
#search-dd.show{display:block}
.sr-head{font-size:10.5px;text-transform:uppercase;letter-spacing:.05em;color:var(--ink-3);font-weight:700;padding:6px 10px 3px}
.sr-item{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:5px;cursor:pointer}
.sr-item:hover,.sr-item.active{background:var(--sf-blue-l)}
.sr-ico{width:26px;height:26px;border-radius:5px;display:grid;place-items:center;color:#fff;font-size:13px;flex-shrink:0}
.sr-t{font-size:13px;color:var(--ink)}
.sr-s{font-size:11px;color:var(--ink-3)}
/* App Launcher modal */
.modal-back{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:120;display:none}
.modal-back.show{display:block}
.launcher-modal{position:fixed;z-index:130;top:58px;left:50%;transform:translateX(-50%);
  width:min(780px,93vw);max-height:82vh;background:var(--card);border-radius:10px;
  box-shadow:0 10px 44px rgba(0,0,0,.4);border:1px solid var(--line);display:none;flex-direction:column}
.launcher-modal.show{display:flex}
.lm-head{padding:16px 20px;border-bottom:1px solid var(--line)}
.lm-head h3{margin:0 0 10px;font-size:15px;color:var(--ink)}
.lm-search{width:100%;padding:8px 12px;border:1px solid var(--line-2);border-radius:6px;
  font-size:13px;background:var(--bg);color:var(--ink);font-family:inherit;outline:none}
.lm-search:focus{border-color:var(--sf-blue);box-shadow:0 0 0 2px var(--sf-blue-l)}
.lm-body{padding:16px 20px;overflow:auto}
.lm-sec{font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:var(--ink-3);font-weight:700;margin:2px 0 10px}
.lm-items{display:flex;flex-direction:column;gap:2px}
.lm-item{display:flex;align-items:center;gap:10px;padding:7px 8px;border-radius:5px;text-align:left;
  border:0;background:none;color:var(--ink);width:100%;font-size:13px;cursor:pointer}
.lm-item:hover{background:var(--sf-blue-l)}
.lm-item .g{margin-left:auto;font-size:11px;color:var(--ink-3);text-align:right}
.g-spacer{flex:1}
.g-icons{display:flex;align-items:center;gap:6px}
.g-ico{width:30px;height:30px;border-radius:50%;display:grid;place-items:center;color:#fff}
.g-ico:hover{background:rgba(255,255,255,.15)}
.g-avatar{width:30px;height:30px;border-radius:50%;background:#7fb0e0;color:#003a6b;
  display:grid;place-items:center;font-weight:700;font-size:12px}

/* App nav bar */
.a-nav{background:var(--nav);border-bottom:1px solid var(--line);display:flex;align-items:center;
  gap:2px;padding:0 14px;flex-shrink:0;overflow-x:auto}
.a-app{display:flex;flex-direction:column;justify-content:center;padding:7px 22px 7px 2px;margin-right:8px}
.a-app b{font-size:15px;color:var(--ink);white-space:nowrap}
.a-app span{font-size:10px;color:var(--ink-3)}
.a-tab{padding:11px 12px 8px;font-size:12.5px;color:var(--ink);white-space:nowrap;
  border-bottom:3px solid transparent;background:transparent;border-top:0;border-left:0;border-right:0}
.a-tab:hover{background:rgba(1,118,211,.06);color:var(--sf-blue)}
.a-tab.on{border-bottom-color:var(--sf-blue);color:var(--sf-blue);font-weight:700}

/* Scroll content */
.sf-body{flex:1;overflow-y:auto;padding:12px 14px 60px}
.sf-body.narrow{max-width:1180px;margin:0 auto;width:100%}

/* ---------- Building blocks ---------- */
.crumb{font-size:11px;color:var(--ink-3);margin-bottom:2px}
.hl{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);
  padding:10px 16px;box-shadow:var(--shadow);margin-bottom:10px}
.hl-top{display:flex;align-items:flex-start;gap:12px}
.hl-ico{width:36px;height:36px;border-radius:7px;background:var(--sf-blue);color:#fff;
  display:grid;place-items:center;font-size:16px;flex-shrink:0}
.hl-title h2{margin:0;font-size:19px;font-weight:400;color:var(--ink)}
.hl-title .sub{font-size:11px;color:var(--ink-3)}
.hl-actions{margin-left:auto;display:flex;gap:6px;flex-wrap:wrap}
.hl-fields{display:flex;flex-wrap:wrap;gap:26px;margin-top:12px;padding-top:10px;border-top:1px solid var(--line)}
.hl-fields .f{min-width:110px}
.hl-fields .f label{display:block;font-size:11px;color:var(--ink-3)}
.hl-fields .f .v{font-size:14px;color:var(--ink)}

.btn{border:1px solid var(--line-2);background:var(--card);color:var(--sf-blue);
  padding:5px 12px;border-radius:4px;font-size:12.5px;font-weight:600}
.btn:hover{background:#f4f8fd}
.btn.pri{background:var(--sf-blue);color:#fff;border-color:var(--sf-blue)}
.btn.pri:hover{background:var(--sf-blue-d)}
.btn.sm{padding:3px 9px;font-size:11.5px}

/* Path */
.path{display:flex;background:var(--card);border:1px solid var(--line);border-radius:var(--radius);
  overflow:hidden;margin-bottom:10px;box-shadow:var(--shadow);align-items:stretch}
.path-stages{display:flex;flex:1;overflow-x:auto}
.stage{position:relative;flex:1;min-width:96px;padding:9px 8px 9px 26px;font-size:11.5px;
  background:var(--path-todo);color:var(--ink-2);white-space:nowrap;border:0}
.stage:after{content:"";position:absolute;right:-11px;top:50%;width:20px;height:20px;
  background:inherit;transform:translateY(-50%) rotate(45deg);z-index:1;
  border-right:2px solid var(--card);border-top:2px solid var(--card)}
.stage.done{background:var(--path-done);color:#fff}
.stage.cur{background:var(--path-current);color:#fff;font-weight:700}
.stage.sel{box-shadow:inset 0 0 0 2px var(--sf-blue);z-index:2}
.stage.sel:not(.cur):not(.done){background:rgba(1,118,211,.20);color:var(--sf-blue);font-weight:700}
.path-btn{border:0;border-left:1px solid var(--line);background:var(--card);color:var(--sf-blue);
  font-weight:700;padding:0 18px;white-space:nowrap}
.path-btn:hover{background:#f4f8fd}

/* Grid */
.cols{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.cols-3{display:grid;grid-template-columns:1.4fr 1.4fr 1fr;gap:10px}
.cols-side{display:grid;grid-template-columns:1fr 360px;gap:10px}
@media(max-width:1000px){.cols,.cols-3,.cols-side{grid-template-columns:1fr}}

/* Record layout: Detail (trái) | Related tabs (giữa) | Activity (phải) */
.cols-rec{display:grid;grid-template-columns:300px minmax(0,1fr) 340px;gap:10px;align-items:start}
.cols-rec.no-rel{grid-template-columns:300px minmax(0,1fr)}
.cols-rec .rec-col{min-width:0}
.cols-rec .rec-col:first-child .fg{grid-template-columns:1fr}
@media(max-width:1200px){
  .cols-rec{grid-template-columns:280px minmax(0,1fr)}
  .cols-rec .rec-col:last-child{grid-column:1 / -1}
}
@media(max-width:900px){.cols-rec,.cols-rec.no-rel{grid-template-columns:1fr}}
.rel{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);margin-bottom:10px}
.rel-tabs{display:flex;gap:2px;border-bottom:1px solid var(--line);padding:0 6px;overflow-x:auto}
.rel-tab{padding:9px 13px;font-size:12.5px;color:var(--ink-2);background:none;border:0;border-top:0;border-left:0;border-right:0;border-bottom:2px solid transparent;white-space:nowrap}
.rel-tab:hover{color:var(--sf-blue)}
.rel-tab.on{color:var(--sf-blue);border-bottom-color:var(--sf-blue);font-weight:700}
.rel-tab .cnt{color:var(--ink-3);font-weight:400;margin-left:3px}
.rel-tab.on .cnt{color:var(--sf-blue)}
.rel-panel{display:none;padding:12px 14px}
.rel-panel.on{display:block}
.rel-tools{display:flex;justify-content:flex-end;gap:6px;margin-bottom:8px}

/* Card */
.card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);
  box-shadow:var(--shadow);margin-bottom:10px}
.card-h{display:flex;align-items:center;gap:8px;padding:8px 14px;border-bottom:1px solid var(--line)}
.card-h .t{font-size:13.5px;font-weight:700;color:var(--ink)}
.card-h .n{font-size:12px;color:var(--ink-3);font-weight:400}
.card-h .r{margin-left:auto;display:flex;gap:6px}
.card-b{padding:12px 14px}

/* field grid */
.fg{display:grid;grid-template-columns:1fr 1fr;gap:2px 30px}
.fg.one{grid-template-columns:1fr}
.fld{padding:7px 0;border-bottom:1px dotted var(--line);display:flex;flex-direction:column;gap:2px}
.fld label{font-size:11px;color:var(--ink-3)}
.fld .v{font-size:13px;color:var(--ink)}
.fld .v.link{color:var(--sf-blue)}
.pencil{margin-left:6px;opacity:.4;font-size:11px}

/* table */
.tbl-wrap{overflow-x:auto}
table.tbl{width:100%;border-collapse:collapse;font-size:12.5px;min-width:520px}
.tbl th{text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:.03em;color:var(--ink-3);
  font-weight:700;padding:7px 10px;border-bottom:1px solid var(--line-2);background:var(--nav);white-space:nowrap}
.tbl td{padding:8px 10px;border-bottom:1px solid var(--line);color:var(--ink);vertical-align:middle}
.tbl tr:hover td{background:rgba(1,118,211,.04)}
.tbl .num{text-align:right;font-variant-numeric:tabular-nums}

/* pills / badges */
.pill{display:inline-flex;align-items:center;gap:5px;padding:2px 9px;border-radius:11px;
  font-size:11px;font-weight:600;border:1px solid transparent}
.pill:before{content:"";width:6px;height:6px;border-radius:50%;background:currentColor}
.pill.ok{color:var(--ok);background:var(--ok-bg)}
.pill.warn{color:var(--warn);background:var(--warn-bg)}
.pill.err{color:var(--err);background:var(--err-bg)}
.pill.info{color:var(--sf-blue);background:var(--sf-blue-l)}
.pill.mut{color:var(--ink-2);background:var(--bg)}

/* banner */
.banner{display:flex;gap:9px;align-items:flex-start;padding:9px 13px;border-radius:5px;
  font-size:12.5px;margin-bottom:10px;border-left:4px solid}
.banner .ic{font-weight:900;flex-shrink:0}
.banner.warn{background:var(--warn-bg);border-color:var(--warn-line);color:var(--warn)}
.banner.err{background:var(--err-bg);border-color:var(--err-line);color:var(--err)}
.banner.info{background:var(--sf-blue-l);border-color:var(--sf-blue);color:var(--sf-blue-d)}
.banner.ok{background:var(--ok-bg);border-color:var(--ok);color:var(--ok)}
.banner b{font-weight:700}

/* activity panel */
.act-tabs{display:flex;gap:2px;border-bottom:1px solid var(--line);padding:0 8px}
.act-tabs .t{padding:8px 12px;font-size:12.5px;color:var(--ink-2);border-bottom:2px solid transparent;background:none;border-top:0;border-left:0;border-right:0}
.act-tabs .t.on{color:var(--sf-blue);border-bottom-color:var(--sf-blue);font-weight:700}
.composer{border:1px solid var(--line-2);border-radius:5px;padding:8px 10px;color:var(--ink-3);
  margin:12px 14px;font-size:12.5px}
.timeline{padding:0 14px 12px}
.tl-item{display:flex;gap:9px;padding:9px 0;border-bottom:1px solid var(--line)}
.tl-dot{width:26px;height:26px;border-radius:5px;background:var(--sf-blue-l);color:var(--sf-blue);
  display:grid;place-items:center;flex-shrink:0;font-size:13px}
.tl-item .m .h{font-size:12.5px;color:var(--ink)}
.tl-item .m .s{font-size:11px;color:var(--ink-3)}

/* progress */
.prog{height:8px;background:var(--line);border-radius:5px;overflow:hidden}
.prog i{display:block;height:100%;background:var(--ok);border-radius:5px}
.prog.blue i{background:var(--sf-blue)}

/* KPI tiles */
.kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:10px}
@media(max-width:1000px){.kpis{grid-template-columns:repeat(2,1fr)}}
.kpi{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);
  padding:12px 14px;box-shadow:var(--shadow)}
.kpi .lab{font-size:11px;color:var(--ink-3);text-transform:uppercase;letter-spacing:.03em}
.kpi .big{font-size:26px;font-weight:300;margin:3px 0;font-variant-numeric:tabular-nums}
.kpi .d{font-size:11px}
.kpi .d.up{color:var(--ok)} .kpi .d.dn{color:var(--err)}

/* app launcher modal */
.launcher{background:var(--card);border-radius:8px;box-shadow:0 4px 20px rgba(0,0,0,.25);
  border:1px solid var(--line);padding:18px 20px;margin-bottom:12px}
.launcher h3{margin:0 0 12px;font-size:13px;color:var(--ink-3);text-transform:uppercase;letter-spacing:.05em}
.tiles{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px}
.tile{border:1px solid var(--line);border-radius:6px;padding:12px;display:flex;gap:10px;align-items:center;background:var(--card)}
.tile:hover{border-color:var(--sf-blue);background:#f4f8fd}
.tile .ti{width:34px;height:34px;border-radius:6px;display:grid;place-items:center;color:#fff;flex-shrink:0;font-size:16px}
.tile b{font-size:13px;display:block;color:var(--ink)}
.tile span{font-size:11px;color:var(--ink-3)}

.note{font-size:11px;color:var(--ink-3);font-style:italic;margin:2px 2px 12px}
.chart{display:flex;align-items:flex-end;gap:8px;height:120px;padding:6px 2px 0}
.chart .bar{flex:1;background:var(--sf-blue);border-radius:3px 3px 0 0;position:relative;min-width:10px}
.chart .bar.plan{background:var(--line-2)}
.chart .bar span{position:absolute;bottom:-17px;left:0;right:0;text-align:center;font-size:10px;color:var(--ink-3)}
.legend{display:flex;gap:16px;font-size:11px;color:var(--ink-2);margin-top:22px}
.legend i{display:inline-block;width:10px;height:10px;border-radius:2px;margin-right:5px;vertical-align:middle}

/* interactivity affordances */
.stage{cursor:pointer}
.v.link,[data-go]{cursor:pointer}
[data-go]:hover{text-decoration:underline}
.crumb [data-go]{color:var(--sf-blue);font-weight:600}
.tbl a[data-go]{cursor:pointer}
/* toast */
#toast{position:fixed;top:64px;left:50%;transform:translateX(-50%) translateY(-14px);
  z-index:200;opacity:0;pointer-events:none;transition:opacity .2s,transform .2s}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast-in{background:var(--ok);color:#fff;padding:9px 18px;border-radius:6px;font-size:13px;
  font-weight:600;box-shadow:0 6px 20px rgba(0,0,0,.28);display:flex;align-items:center;gap:8px}
@media(prefers-reduced-motion:reduce){#toast{transition:none}}

/* ---------- List View ---------- */
.lv-top{display:flex;align-items:center;gap:12px;background:var(--card);border:1px solid var(--line);
  border-radius:var(--radius) var(--radius) 0 0;padding:9px 14px;box-shadow:var(--shadow)}
.lv-title{display:flex;flex-direction:column;line-height:1.25}
.lv-obj{font-size:11px;color:var(--ink-3)}
.lv-view{font-size:18px;color:var(--ink);font-weight:400}
.lv-meta{font-size:11px;color:var(--ink-3)}
.lv-tools{display:flex;align-items:center;gap:10px;background:var(--card);
  border:1px solid var(--line);border-top:0;padding:6px 14px}

function iconFor(g){return GROUPICON[g]||['▦','#0176d3'];}

function appnav(app, sub, tabs, active){

  </div>`;
}
function hl({crumb,ico,color,title,sub,fields,actions}){
  return `<div class="hl">
    <div class="crumb">${crumb||''}</div>
    <div class="hl-top">
      <div class="hl-ico" ${color?`style="background:${color}"`:''}>${ico||'▦'}</div>
      <div class="hl-title"><h2>${title}</h2><div class="sub">${sub||''}</div></div>

    </div>
    ${fields?`<div class="hl-fields">${fields.map(f=>`<div class="f"><label>${f[0]}</label><div class="v">${f[1]}</div></div>`).join('')}</div>`:''}
  </div>`;
}
function path(stages, cur, btn){
  return `<div class="path"><div class="path-stages">${stages.map((s,i)=>
    `<div class="stage ${i<cur?'done':''} ${i===cur?'cur':''}">${s}</div>`).join('')}</div>
    <button class="path-btn">${btn||'✓ Đánh dấu hoàn tất'}</button></div>`;
}
function card(t,body,{n,r}={}){
  return `<div class="card"><div class="card-h"><span class="t">${t}</span>${n?`<span class="n">(${n})</span>`:''}${r?`<span class="r">${r}</span>`:''}</div><div class="card-b">${body}</div></div>`;
}
function fg(rows,one){
  return `<div class="fg ${one?'one':''}">${rows.map(r=>`<div class="fld"><label>${r[0]}</label><div class="v ${r[2]||''}" ${r[3]?`data-go="${r[3]}"`:''}>${r[1]}<span class="pencil">✎</span></div></div>`).join('')}</div>`;
}
function tbl(cols, rows){
  return `<div class="tbl-wrap"><table class="tbl"><thead><tr>${cols.map(c=>`<th class="${c.num?'num':''}">${c.t||c}</th>`).join('')}</tr></thead>

}

/* ============ List View component + screens ============ */
function lv({crumb,ico,color,object,view,count,cols,rows,newLabel}){
  return `<div class="crumb">${crumb||''}</div>
  <div class="lv-top">
    <div class="hl-ico" style="background:${color||'var(--sf-blue)'}">${ico||'▦'}</div>
    <div class="lv-title"><div class="lv-obj">${object}</div>
      <div class="lv-view">${view||'Tất cả'} <span style="font-size:11px">▾</span></div>
      <div class="lv-meta">${count||rows.length} mục · sắp xếp theo cột đầu · cập nhật vài giây trước</div></div>
    <div class="hl-actions"><button class="btn">Nhập</button><button class="btn pri">${newLabel||'Mới'}</button></div>
  </div>
  <div class="lv-tools"><span class="lv-search">🔍 Tìm trong danh sách này…</span><span class="lv-icons">⚙ ⭯ ▦ ▤</span></div>
  <div class="card lv-body"><div class="tbl-wrap"><table class="tbl"><thead><tr><th style="width:26px"></th>
   ${cols.map(c=>`<th class="${c.num?'num':''}">${c.t||c} ▾</th>`).join('')}<th style="width:24px"></th></tr></thead>
   <tbody>${rows.map(r=>`<tr><td><input type="checkbox"></td>
     ${r.cells.map((c,i)=>`<td class="${cols[i]&&cols[i].num?'num':''}">${i===0?`<a data-go="${r.go}">${c}</a>`:c}</td>`).join('')}
     <td>▾</td></tr>`).join('')}</tbody></table></div></div>`;
}

/* ============ router ============ */
function buildNav(){
  const wrap = document.getElementById('nav');
  wrap.innerHTML = `<div class="nav-brand"><h1>Prototype CRM Nam Phong</h1><p>Salesforce · demo theo quy trình</p>
     <div class="nav-hint">👉 <b>List View</b> = danh sách bản ghi, bấm 1 dòng để mở <b>Record</b>. <b>Custom</b> = trang toàn màn hình. Nút ☰ để ẩn/hiện menu.</div></div>`
   + NAV.map(grp=>`<div class="nav-group">${grp.g}</div>`
     + grp.items.map(it=>{const tag=it[3]||'';return `<button class="nav-item ${tag==='record'?'sub':''}" data-id="${it[0]}" onclick="go('${it[0]}')">
        <span class="ni-row"><span class="ni-label">${it[1]}</span>${tag?`<span class="tag t-${tag}">${TAGLABEL[tag]}</span>`:''}</span>
        ${it[2]?`<span class="dept">${it[2]}</span>`:''}</button>`;}).join('')).join('');
}
function buildRecordLayout(root){
  root.querySelectorAll('.cols-side').forEach(cs=>{
    const kids=Array.from(cs.children);
    if(kids.length<2) return;
    const leftWrap=kids[0], rightCol=kids[1];
    const cards=Array.from(leftWrap.children).filter(el=>el.classList&&el.classList.contains('card'));
    if(cards.length<1) return;
    // Detail = card chứa field-grid (.fg); nếu không có thì lấy card đầu
    let di=cards.findIndex(c=>c.querySelector('.fg')); if(di<0) di=0;
    const detail=cards[di], related=cards.filter((_,i)=>i!==di);
    cs.classList.remove('cols-side'); cs.classList.add('cols-rec');
    cs.innerHTML='';
    // Cột trái: Detail
    const c1=document.createElement('div'); c1.className='rec-col'; c1.appendChild(detail); cs.appendChild(c1);
    // Cột giữa: các related list dạng tab
    if(related.length){
      const c2=document.createElement('div'); c2.className='rec-col';
      const rel=document.createElement('div'); rel.className='rel';
      const tabs=document.createElement('div'); tabs.className='rel-tabs';
      const panels=document.createElement('div');
      related.forEach((cd,i)=>{
        const h=cd.querySelector('.card-h');
        const tEl=h&&h.querySelector('.t'), nEl=h&&h.querySelector('.n'), rEl=h&&h.querySelector('.r');
        const bEl=cd.querySelector('.card-b');
        const btn=document.createElement('button');
        btn.className='rel-tab'+(i===0?' on':'');
        btn.innerHTML=(tEl?tEl.textContent:('Danh sách '+(i+1)))+(nEl?` <span class="cnt">${nEl.textContent}</span>`:'');
        tabs.appendChild(btn);
        const panel=document.createElement('div'); panel.className='rel-panel'+(i===0?' on':'');
        if(rEl){ const tools=document.createElement('div'); tools.className='rel-tools'; tools.appendChild(rEl); panel.appendChild(tools); }
        if(bEl){ while(bEl.firstChild) panel.appendChild(bEl.firstChild); }
        panels.appendChild(panel);
      });
      rel.appendChild(tabs); rel.appendChild(panels); c2.appendChild(rel); cs.appendChild(c2);
    } else { cs.classList.add('no-rel'); }
    // Cột phải: Activity
    const c3=document.createElement('div'); c3.className='rec-col'; c3.appendChild(rightCol); cs.appendChild(c3);
  });
}
function go(id){
  document.getElementById('screen').innerHTML = (S[id]||S.home)();
  buildRecordLayout(document.getElementById('screen'));
  document.querySelectorAll('.nav-item').forEach(b=>b.classList.toggle('active', b.dataset.id===id));
  const body=document.querySelector('.sf-body'); if(body) body.scrollTop=0;
  if(matchMedia('(max-width:820px)').matches) document.getElementById('app').classList.add('nav-hidden');
}
function toggleNav(){ document.getElementById('app').classList.toggle('nav-hidden'); }

/* ---- App Launcher ---- */
function openLauncher(){
  document.getElementById('mback').classList.add('show');
  document.getElementById('lmodal').classList.add('show');
  renderLauncher('');
  const i=document.getElementById('lmsearch'); i.value=''; i.focus();
}
function closeLauncher(){
  document.getElementById('mback').classList.remove('show');
  document.getElementById('lmodal').classList.remove('show');
}
function renderLauncher(q){
  const nq=norm(q);
  const apps=APPS.filter(a=>!nq||norm(a[0]).includes(nq));
  const items=INDEX.filter(it=>!nq||norm(it.label).includes(nq)||norm(it.group).includes(nq)||norm(it.dept).includes(nq));
  document.getElementById('lmbody').innerHTML=
   `<div class="lm-sec">Ứng dụng (${apps.length})</div>
    <div class="tiles">${apps.map(a=>`<button class="tile" onclick="closeLauncher();go('${a[3]}')"><span class="ti" style="background:${a[1]}">${a[2]}</span><span><b>${a[0]}</b><span>Mở ứng dụng</span></span></button>`).join('')||'<div class="note">Không có ứng dụng khớp</div>'}</div>
    <div class="lm-sec" style="margin-top:18px">Tất cả mục (${items.length})</div>
    <div class="lm-items">${items.map(it=>{const ic=iconFor(it.group);
      return `<button class="lm-item" onclick="closeLauncher();go('${it.id}')"><span class="sr-ico" style="background:${ic[1]}">${ic[0]}</span><span>${it.label}</span><span class="g">${it.group}${it.tag?' · '+(TAGLABEL[it.tag]||''):''}</span></button>`;}).join('')||'<div class="note">Không có mục khớp</div>'}</div>`;
}

/* ---- Global search ---- */
function doSearch(q){
  const dd=document.getElementById('search-dd'); const nq=norm(q);
  if(!nq){ dd.classList.remove('show'); dd.innerHTML=''; return; }
  const res=INDEX.filter(it=>norm(it.label).includes(nq)||norm(it.group).includes(nq)||norm(it.dept).includes(nq)).slice(0,12);
  dd.innerHTML = `<div class="sr-head">Kết quả (${res.length})</div>` + (res.length
     ? res.map((it,i)=>{const ic=iconFor(it.group);
        return `<div class="sr-item ${i===0?'active':''}" data-id="${it.id}"><span class="sr-ico" style="background:${ic[1]}">${ic[0]}</span><span><div class="sr-t">${it.label}</div><div class="sr-s">${it.group}${it.tag?' · '+(TAGLABEL[it.tag]||''):''}</div></span></div>`;}).join('')
     : `<div class="note" style="padding:8px 10px">Không tìm thấy “${q}”. Thử: đơn hàng, cơ hội, NCC, case…</div>`);
  dd.classList.add('show');
}
function pickSearch(id){
  const inp=document.getElementById('gsearch'); inp.value='';
  document.getElementById('search-dd').classList.remove('show');
  go(id);
}
function setupSearch(){
  const inp=document.getElementById('gsearch'); const dd=document.getElementById('search-dd');
  inp.addEventListener('input',e=>doSearch(e.target.value));
  inp.addEventListener('focus',e=>{ if(e.target.value) doSearch(e.target.value); });
  inp.addEventListener('keydown',e=>{
    const items=[...dd.querySelectorAll('.sr-item')]; if(!items.length) return;
    let idx=items.findIndex(x=>x.classList.contains('active'));
    if(e.key==='ArrowDown'){e.preventDefault(); idx=Math.min(idx+1,items.length-1);}
    else if(e.key==='ArrowUp'){e.preventDefault(); idx=Math.max(idx-1,0);}
    else if(e.key==='Enter'){e.preventDefault(); if(items[idx]) pickSearch(items[idx].dataset.id); return;}
    else if(e.key==='Escape'){dd.classList.remove('show'); return;}
    items.forEach(x=>x.classList.remove('active')); if(items[idx]) items[idx].classList.add('active');
  });
  dd.addEventListener('click',e=>{const it=e.target.closest('.sr-item'); if(it) pickSearch(it.dataset.id);});
  document.addEventListener('click',e=>{ if(!e.target.closest('.g-search')) dd.classList.remove('show'); });
  document.getElementById('lmsearch').addEventListener('input',e=>renderLauncher(e.target.value));
  document.addEventListener('keydown',e=>{ if(e.key==='Escape') closeLauncher(); });
}

/* ---- in-page interactivity ---- */
const TAB2ID={'Trang chủ':'home','Lead':'lead_list','Cơ hội':'opp_list','Đơn hàng':'order_list','Khách hàng':'master',
 'NCC':'vendor_list','Case':'case_list','Báo cáo':'reports','Phê duyệt':'approve','Dashboard':'reports','Cảnh báo':'reports',
 'Bảng giá':'pricebook_list','Hợp đồng':'contract_list','Sản phẩm':'master','Báo giá XK':'exquote_list','Chứng từ':'excontract_list',
 'Thanh toán':'lc','PR':'pr','Đơn mua (PO)':'ppo_list','Nhận hàng':'receipt','Kế hoạch NVL':'matinv',
 'Shipment':'shipment_list','Knowledge':'case_list'};
function resolveTab(app,label){
  if(label==='Sales Contract') return app.includes('nhập khẩu')?'imcontract_list':'excontract_list';
  return TAB2ID[label];
}
function toast(msg){
  let t=document.getElementById('toast');
  if(!t){t=el('<div id="toast"></div>');document.body.appendChild(t);}
  t.innerHTML=`<div class="toast-in"><span>✓</span><span>${msg}</span></div>`;
  t.classList.add('show'); clearTimeout(window._tt);
  window._tt=setTimeout(()=>t.classList.remove('show'),2300);
}
function setupClicks(){
  const scr=document.getElementById('screen');
  scr.addEventListener('click',e=>{
    // 1) cross-navigation links
    const link=e.target.closest('[data-go]');
    if(link){ go(link.dataset.go); return; }
    // 2) app tabs -> open related screen
    const tab=e.target.closest('.a-tab');
    if(tab){
      const app=tab.closest('.a-nav').querySelector('.a-app b').textContent;
      const id=resolveTab(app, tab.textContent.trim());
      if(id && S[id]) return go(id);
      tab.parentElement.querySelectorAll('.a-tab').forEach(x=>x.classList.remove('on'));
      tab.classList.add('on'); return;
    }
    // 3) Path stage -> chỉ CHỌN (preview), chưa áp dụng
    const st=e.target.closest('.stage');
    if(st){
      const stages=[...st.parentElement.children];
      stages.forEach(s=>s.classList.remove('sel'));
      st.classList.add('sel');
      const pb=st.closest('.path').querySelector('.path-btn');
      const cur=stages.findIndex(s=>s.classList.contains('cur'));
      const sel=stages.indexOf(st);
      pb.textContent = (sel===cur) ? '✓ Đánh dấu hoàn tất' : '✓ Đánh dấu giai đoạn này';
      return;
    }
    // 4) "Đánh dấu hoàn tất" -> áp dụng giai đoạn vừa chọn làm hiện tại
    const pb=e.target.closest('.path-btn');
    if(pb){
      const stages=[...pb.closest('.path').querySelector('.path-stages').children];
      const cur=stages.findIndex(s=>s.classList.contains('cur'));
      const sel=stages.findIndex(s=>s.classList.contains('sel'));
      let target = (sel>-1 && sel!==cur) ? sel : Math.min(cur+1, stages.length-1);
      stages.forEach((s,k)=>{ s.classList.remove('sel');
        s.classList.toggle('done',k<target); s.classList.toggle('cur',k===target); });
      pb.textContent='✓ Đánh dấu hoàn tất';
      toast('Giai đoạn hiện tại: '+stages[target].textContent.trim());
      return;
    }
    // 5) Activity / detail tabs
    const at=e.target.closest('.act-tabs .t');
    if(at){ at.parentElement.querySelectorAll('.t').forEach(x=>x.classList.remove('on')); at.classList.add('on'); return; }
    // 5b) Related list tabs (cột giữa)
    const rt=e.target.closest('.rel-tab');
    if(rt){
      const rel=rt.closest('.rel');
      const idx=[...rt.parentElement.children].indexOf(rt);
      rel.querySelectorAll('.rel-tab').forEach(x=>x.classList.remove('on'));
      rt.classList.add('on');
      rel.querySelectorAll('.rel-panel').forEach((p,i)=>p.classList.toggle('on',i===idx));
      return;
    }
    // 6) action buttons -> toast
    const btn=e.target.closest('.btn');
    if(btn){ toast('“'+btn.textContent.trim()+'” — thao tác demo'); return; }
  });
}
function toggleTheme(){ /* theme cố định: luôn nền trắng */ }
INDEX=[]; NAV.forEach(g=>g.items.forEach(it=>INDEX.push(
  {id:it[0], label:it[1].replace(/^↳\s*/,''), dept:it[2]||'', tag:it[3]||'', group:g.g})));
buildNav();
setupClicks();
setupSearch();
go('home');
