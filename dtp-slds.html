<!doctype html>
<html lang="vi" data-theme="light">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Prototype CRM Đồng Tiến — SLDS Wireframe</title>
<!-- Salesforce Lightning Design System (SLDS) — CDN thật -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@salesforce-ux/design-system@2/assets/styles/salesforce-lightning-design-system.min.css">
<style>
:root{
  --sf-blue:#0176d3; --sf-blue-d:#014486; --sf-blue-l:#eef4ff;
  --ink:#181818; --ink-2:#5c5c5c; --ink-3:#747474;
  --bg:#f3f3f3; --card:#ffffff; --line:#e5e5e5; --line-2:#d8d8d8;
  --ok:#2e844a; --ok-bg:#ebf7ee; --warn:#8c4b02; --warn-bg:#fef1e7; --warn-line:#fe9339;
  --err:#ba0517; --err-bg:#fdecee; --err-line:#ea001e;
  --path-todo:#e5e5e5; --path-done:#0176d3; --path-current:#014486;
  --nav:#f8fafb;
  --shadow:0 2px 4px rgba(0,0,0,.07);
  --radius:.4rem;
}
:root[data-theme="light"]{ --ink:#181818; --ink-2:#5c5c5c; --ink-3:#747474; --bg:#f3f3f3;
  --card:#ffffff; --line:#e5e5e5; --line-2:#d8d8d8; --nav:#f8fafb; --sf-blue-l:#eef4ff;
  --ok-bg:#ebf7ee; --warn-bg:#fef1e7; --err-bg:#fdecee; --shadow:0 2px 4px rgba(0,0,0,.07);}

*{box-sizing:border-box}
body{margin:0;font-family:"Helvetica Neue",Arial,"Segoe UI",sans-serif;
  background:var(--bg);color:var(--ink);font-size:13px;line-height:1.4;-webkit-font-smoothing:antialiased}
button{font-family:inherit;cursor:pointer}
a{color:var(--sf-blue);text-decoration:none}
a:hover{text-decoration:underline}

/* ---------- Layout ---------- */
.app{display:grid;grid-template-columns:290px 1fr;height:100vh;overflow:hidden;transition:grid-template-columns .22s ease}
.app.nav-hidden{grid-template-columns:0 1fr}
.app.nav-hidden .navigator{transform:translateX(-100%)}

/* ---------- Prototype navigator (left, not part of SF) ---------- */
.navigator{background:#0b1a2b;color:#cfe0f0;overflow-y:auto;border-right:1px solid #06121f;transition:transform .22s ease}
.backdrop{display:none}
@media(max-width:820px){
  .app{grid-template-columns:1fr}
  .navigator{position:fixed;top:0;left:0;bottom:0;width:280px;z-index:60;box-shadow:6px 0 24px rgba(0,0,0,.4)}
  .app.nav-hidden .navigator{transform:translateX(-100%)}
  .backdrop{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:55}
  .app:not(.nav-hidden) .backdrop{display:block}
}
.nav-brand{padding:16px 16px 12px;position:sticky;top:0;background:#0b1a2b;z-index:2;border-bottom:1px solid #16334f}
.nav-brand h1{font-size:14px;margin:0 0 2px;color:#fff;letter-spacing:.2px}
.nav-brand p{margin:0;font-size:11px;color:#7fa8cf}
.nav-hint{font-size:11px;color:#9ed0ff;background:#12334f;border-radius:5px;padding:7px 9px;margin-top:9px;line-height:1.35}
.nav-group{font-size:10.5px;text-transform:uppercase;letter-spacing:.09em;color:#5f86ac;padding:14px 16px 5px;font-weight:700}
.nav-item{display:block;width:100%;text-align:left;border:0;background:transparent;color:#cfe0f0;
  padding:7px 16px 7px 22px;font-size:12.5px;border-left:3px solid transparent}
.nav-item:hover{background:#12263c;color:#fff}
.nav-item.active{background:#0176d3;color:#fff;border-left-color:#9ed0ff;font-weight:600}
.nav-item .dept{display:block;font-size:10px;color:#7fa8cf;margin-top:1px}
.nav-item.active .dept{color:#dbecff}
.nav-item.sub{padding-left:30px;font-size:12px}
.nav-item.sub .ni-label{color:#a9c6e2}
.nav-item.active.sub .ni-label{color:#fff}
.ni-row{display:flex;align-items:center;gap:6px;justify-content:space-between}
.ni-label{flex:1}
.tag{font-size:8.5px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;
  padding:1px 5px;border-radius:3px;white-space:nowrap;flex-shrink:0}
.t-list{background:#0a6b52;color:#c8f4e4}
.t-record{background:#1f3a52;color:#9ec7ea}
.t-custom{background:#6a3b8f;color:#e9d3ff}
.t-flow{background:#8a5a00;color:#ffe0a3}
.nav-item.active .tag{filter:brightness(1.15)}

/* ---------- Salesforce workspace ---------- */
.sf{display:flex;flex-direction:column;height:100vh;overflow:hidden}

/* Global header */
.g-header{background:var(--sf-blue);display:flex;align-items:center;gap:10px;padding:6px 12px;flex-shrink:0}
.g-burger{background:none;border:0;color:#fff;font-size:16px;width:32px;height:32px;border-radius:5px;opacity:.92;flex-shrink:0}
.g-burger:hover{background:rgba(255,255,255,.15)}
.g-fav{background:none;border:0;color:#fff;font-size:16px;flex-shrink:0}
.g-fav:hover{background:rgba(255,255,255,.15)}
.g-gear,.g-help{font-size:15px;font-weight:700}
.g-notif{position:relative;display:flex}
.g-bell{position:relative;background:none;border:0}
.notif-badge{position:absolute;top:1px;right:1px;min-width:15px;height:15px;padding:0 3px;background:#ff5d2b;color:#fff;
  font-size:9px;font-weight:700;line-height:1;border-radius:8px;display:grid;place-items:center;border:1.5px solid var(--sf-blue)}
.notif-badge:empty{display:none}
.notif-panel{position:absolute;top:calc(100% + 8px);right:0;width:370px;max-width:92vw;background:var(--card);
  border:1px solid var(--line);border-radius:10px;box-shadow:0 12px 44px rgba(0,0,0,.30);z-index:115;display:none;overflow:hidden}
.notif-panel.show{display:block}
.notif-head{display:flex;align-items:center;justify-content:space-between;padding:12px 15px;border-bottom:1px solid var(--line);
  font-size:14px;font-weight:700;color:var(--ink)}
.notif-clear{background:none;border:0;color:var(--sf-blue);font-size:11.5px;font-weight:600}
.notif-clear:hover{text-decoration:underline}
.notif-list{max-height:min(70vh,520px);overflow:auto}
.notif-item{display:flex;gap:11px;padding:11px 15px;border-bottom:1px solid var(--line);cursor:pointer}
.notif-item:last-child{border-bottom:0}
.notif-item:hover{background:var(--sf-blue-l)}
.notif-item.unread{background:#f0f7ff}
.notif-item.unread:hover{background:var(--sf-blue-l)}
.n-ico{width:32px;height:32px;border-radius:50%;display:grid;place-items:center;color:#fff;font-size:15px;flex-shrink:0}
.n-body{flex:1;min-width:0}
.n-title{font-size:12.5px;color:var(--ink);line-height:1.4}
.n-time{font-size:11px;color:var(--ink-3);margin-top:3px}
.n-dot{width:8px;height:8px;border-radius:50%;background:var(--sf-blue);flex-shrink:0;margin-top:6px}
.notif-empty{padding:26px;text-align:center;color:var(--ink-3);font-size:12.5px}
.waffle{display:grid;grid-template-columns:repeat(3,4px);grid-gap:2px;padding:8px;border-radius:5px;flex-shrink:0}
.nav-waffle{align-self:center;margin:0 6px 0 2px;background:none;border:0}
.nav-waffle span{background:#5c5c5c}
.nav-waffle:hover{background:#eaeaea}
.waffle span{width:4px;height:4px;background:#fff;border-radius:1px;opacity:.9}
.waffle:hover{background:rgba(255,255,255,.15)}
.g-search{width:min(560px,46vw);flex:0 0 auto;background:#fff;border-radius:16px;display:flex;align-items:center;
  gap:8px;padding:5px 14px;color:#747474;position:relative}
.g-search svg{flex-shrink:0}
.g-search input{flex:1;border:0;outline:none;background:transparent;font-size:13px;color:#181818;font-family:inherit}
.g-search input::placeholder{color:#747474}
#search-dd{position:absolute;top:calc(100% + 6px);left:0;right:0;background:var(--card);
  border:1px solid var(--line);border-radius:8px;box-shadow:0 8px 30px rgba(0,0,0,.28);
  z-index:110;max-height:64vh;overflow:auto;display:none;padding:6px}
#search-dd.show{display:block}
.sr-head{font-size:10.5px;text-transform:uppercase;letter-spacing:.05em;color:var(--ink-3);font-weight:700;padding:6px 10px 3px}
.sr-item{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:5px;cursor:pointer}
.sr-item:hover,.sr-item.active{background:var(--sf-blue-l)}
.sr-ico{width:26px;height:26px;border-radius:5px;display:grid;place-items:center;color:#fff;font-size:13px;flex-shrink:0}
.sr-t{font-size:13px;color:var(--ink)}
.sr-s{font-size:11px;color:var(--ink-3)}
/* App Launcher modal */
.modal-back{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:120;display:none}
.modal-back.show{display:block}
.launcher-modal{position:fixed;z-index:130;top:58px;left:50%;transform:translateX(-50%);
  width:min(780px,93vw);max-height:82vh;background:var(--card);border-radius:10px;
  box-shadow:0 10px 44px rgba(0,0,0,.4);border:1px solid var(--line);display:none;flex-direction:column}
.launcher-modal.show{display:flex}
/* Modal tạo PO */
.po-modal{position:fixed;z-index:130;top:50%;left:50%;transform:translate(-50%,-50%);
  width:min(880px,94vw);max-height:88vh;background:var(--card);border-radius:10px;
  box-shadow:0 12px 48px rgba(0,0,0,.42);border:1px solid var(--line);display:none;flex-direction:column}
.po-modal.show{display:flex}
.po-modal.sm{width:min(440px,92vw)}
.pm-head{display:flex;align-items:center;justify-content:space-between;padding:14px 20px;border-bottom:1px solid var(--line)}
.pm-head h3{margin:0;font-size:15px;color:var(--ink)}
.pm-head button{background:none;border:0;font-size:16px;color:var(--ink-3);width:28px;height:28px;border-radius:5px}
.pm-head button:hover{background:var(--bg)}
.pm-body{padding:10px 20px;overflow:auto;flex:1}
.po-stage select{padding:5px 8px;border:1px solid var(--line-2);border-radius:5px;font-size:12.5px;
  font-family:inherit;background:var(--card);color:var(--ink);min-width:200px;outline:none}
.po-stage select:focus{border-color:var(--sf-blue);box-shadow:0 0 0 2px var(--sf-blue-l)}
.pm-foot{border-top:1px solid var(--line);padding:12px 20px;background:var(--bg);border-radius:0 0 10px 10px}
.po-sum-h{font-size:13px;color:var(--ink);margin-bottom:8px}
.po-sum-h b{color:var(--sf-blue)}
.po-hint{font-size:12px;color:var(--ink-3);margin-bottom:6px}
.po-card{border:1px solid var(--line);border-radius:6px;margin-bottom:8px;background:var(--card);overflow:hidden}
.po-card-h{padding:7px 12px;border-bottom:1px solid var(--line);font-size:12.5px;color:var(--ink);background:var(--nav)}
.po-card-h span{color:var(--ink-3);font-weight:400}
.po-line{display:flex;justify-content:space-between;padding:5px 12px;font-size:12px;color:var(--ink-2);border-bottom:1px dotted var(--line)}
.po-line:last-child{border-bottom:0}
.pm-actions{display:flex;justify-content:flex-end;gap:8px;margin-top:12px}
.po-del{width:22px;height:22px;border-radius:50%;border:1px solid var(--line-2);background:var(--card);
  color:var(--err);font-weight:700;font-size:15px;line-height:1;cursor:pointer;display:inline-flex;align-items:center;justify-content:center}
.po-del:hover{background:#f0f0f0;border-color:var(--err)}
.po-actcell{white-space:nowrap}
.po-add{width:22px;height:22px;border-radius:50%;border:1px solid var(--line-2);background:var(--card);
  color:var(--sf-blue);font-weight:700;font-size:15px;line-height:1;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;margin-left:4px}
.po-add:hover{background:#f0f0f0;border-color:var(--sf-blue)}
.po-supcell{display:flex;gap:5px;align-items:center}
.po-newsup{white-space:nowrap;flex-shrink:0}
.po-qty{width:84px;padding:4px 7px;border:1px solid var(--line-2);border-radius:4px;font-family:inherit;font-size:12.5px;text-align:right;background:var(--card);color:var(--ink)}
.po-qty:focus{outline:none;border-color:var(--sf-blue);box-shadow:0 0 0 2px var(--sf-blue-l)}
.buy-cb,.buy-row,.pr-row,.pr-all,.lv-row,.lv-all{cursor:pointer;width:15px;height:15px}
.mass-sel{width:100%;padding:8px 10px;border:1px solid var(--line-2);border-radius:6px;font-size:13px;font-family:inherit;background:var(--card);color:var(--ink);outline:none}
.mass-sel:focus{border-color:var(--sf-blue);box-shadow:0 0 0 2px var(--sf-blue-l)}
.btn[disabled]{opacity:.45;cursor:not-allowed}
.lm-head{padding:16px 20px;border-bottom:1px solid var(--line)}
.lm-head h3{margin:0 0 10px;font-size:15px;color:var(--ink)}
.lm-search{width:100%;padding:8px 12px;border:1px solid var(--line-2);border-radius:6px;
  font-size:13px;background:var(--bg);color:var(--ink);font-family:inherit;outline:none}
.lm-search:focus{border-color:var(--sf-blue);box-shadow:0 0 0 2px var(--sf-blue-l)}
.lm-body{padding:16px 20px;overflow:auto}
.lm-sec{font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:var(--ink-3);font-weight:700;margin:2px 0 10px}
.lm-items{display:flex;flex-direction:column;gap:2px}
.lm-item{display:flex;align-items:center;gap:10px;padding:7px 8px;border-radius:5px;text-align:left;
  border:0;background:none;color:var(--ink);width:100%;font-size:13px;cursor:pointer}
.lm-item:hover{background:var(--sf-blue-l)}
.lm-item .g{margin-left:auto;font-size:11px;color:var(--ink-3);text-align:right}
.g-spacer{flex:1}
.g-icons{display:flex;align-items:center;gap:6px}
.g-ico{width:30px;height:30px;border-radius:50%;display:grid;place-items:center;color:#fff}
.g-ico:hover{background:rgba(255,255,255,.15)}
.g-avatar{width:30px;height:30px;border-radius:50%;background:#7fb0e0;color:#003a6b;
  display:grid;place-items:center;font-weight:700;font-size:12px}

/* App nav bar */
.a-nav{background:var(--nav);border-bottom:1px solid var(--line);display:flex;align-items:center;
  gap:2px;padding:0 14px;flex-shrink:0;overflow-x:auto}
.a-app{display:flex;flex-direction:column;justify-content:center;padding:7px 22px 7px 2px;margin-right:8px}
.a-app b{font-size:15px;color:var(--ink);white-space:nowrap}
.a-app span{font-size:10px;color:var(--ink-3)}
.a-tab{padding:11px 12px 8px;font-size:12.5px;color:var(--ink);white-space:nowrap;
  border-bottom:3px solid transparent;background:transparent;border-top:0;border-left:0;border-right:0}
.a-tab:hover{background:rgba(1,118,211,.06);color:var(--sf-blue)}
.a-tab.on{border-bottom-color:var(--sf-blue);color:var(--sf-blue);font-weight:700}

/* Scroll content */
.sf-body{flex:1;overflow-y:auto;padding:12px 14px 60px}
.sf-body.narrow{max-width:1180px;margin:0 auto;width:100%}

/* ---------- Building blocks ---------- */
.crumb{font-size:11px;color:var(--ink-3);margin-bottom:2px}
.hl{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);
  padding:10px 16px;box-shadow:var(--shadow);margin-bottom:10px}
.hl-top{display:flex;align-items:flex-start;gap:12px}
.hl-ico{width:36px;height:36px;border-radius:7px;background:var(--sf-blue);color:#fff;
  display:grid;place-items:center;font-size:16px;flex-shrink:0}
.hl-title h2{margin:0;font-size:19px;font-weight:400;color:var(--ink)}
.hl-title .sub{font-size:11px;color:var(--ink-3)}
.hl-actions{margin-left:auto;display:flex;gap:6px;flex-wrap:wrap}
.hl-fields{display:flex;flex-wrap:wrap;gap:26px;margin-top:12px;padding-top:10px;border-top:1px solid var(--line)}
.hl-fields .f{min-width:110px}
.hl-fields .f label{display:block;font-size:11px;color:var(--ink-3)}
.hl-fields .f .v{font-size:14px;color:var(--ink)}

.btn{border:1px solid var(--line-2);background:var(--card);color:var(--sf-blue);
  padding:5px 12px;border-radius:4px;font-size:12.5px;font-weight:600}
.btn:hover{background:#f4f8fd}
.btn.pri{background:var(--sf-blue);color:#fff;border-color:var(--sf-blue)}
.btn.pri:hover{background:var(--sf-blue-d)}
.btn.sm{padding:3px 9px;font-size:11.5px}

/* Path */
.path{display:flex;background:var(--card);border:1px solid var(--line);border-radius:var(--radius);
  overflow:hidden;margin-bottom:10px;box-shadow:var(--shadow);align-items:stretch}
.path-stages{display:flex;flex:1;overflow-x:auto}
.stage{position:relative;flex:1;min-width:96px;padding:9px 8px 9px 26px;font-size:11.5px;
  background:var(--path-todo);color:var(--ink-2);white-space:nowrap;border:0}
.stage:after{content:"";position:absolute;right:-11px;top:50%;width:20px;height:20px;
  background:inherit;transform:translateY(-50%) rotate(45deg);z-index:1;
  border-right:2px solid var(--card);border-top:2px solid var(--card)}
.stage.done{background:var(--path-done);color:#fff}
.stage.cur{background:var(--path-current);color:#fff;font-weight:700}
.stage.sel{box-shadow:inset 0 0 0 2px var(--sf-blue);z-index:2}
.stage.sel:not(.cur):not(.done){background:rgba(1,118,211,.20);color:var(--sf-blue);font-weight:700}
.path-btn{border:0;border-left:1px solid var(--line);background:var(--card);color:var(--sf-blue);
  font-weight:700;padding:0 18px;white-space:nowrap}
.path-btn:hover{background:#f4f8fd}

/* Grid */
.cols{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.cols-3{display:grid;grid-template-columns:1.4fr 1.4fr 1fr;gap:10px}
.cols-side{display:grid;grid-template-columns:1fr 360px;gap:10px}
@media(max-width:1000px){.cols,.cols-3,.cols-side{grid-template-columns:1fr}}

/* Record layout: Detail (trái) | Related tabs (giữa) | Activity (phải) */
.cols-rec{display:grid;grid-template-columns:300px minmax(0,1fr) 340px;gap:10px;align-items:start}
.cols-rec.no-rel{grid-template-columns:300px minmax(0,1fr)}
.cols-rec.wide{grid-template-columns:minmax(0,1fr) 340px}
@media(max-width:1200px){.cols-rec.wide{grid-template-columns:1fr}}
.cols-rec .rec-col{min-width:0}
.cols-rec .rec-col:first-child .fg{grid-template-columns:1fr}
@media(max-width:1200px){
  .cols-rec{grid-template-columns:280px minmax(0,1fr)}
  .cols-rec .rec-col:last-child{grid-column:1 / -1}
}
@media(max-width:900px){.cols-rec,.cols-rec.no-rel{grid-template-columns:1fr}}
.rel{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);margin-bottom:10px}
.rel-tabs{display:flex;gap:2px;border-bottom:1px solid var(--line);padding:0 6px;overflow-x:auto}
.rel-tab{padding:9px 13px;font-size:12.5px;color:var(--ink-2);background:none;border:0;border-top:0;border-left:0;border-right:0;border-bottom:2px solid transparent;white-space:nowrap}
.rel-tab:hover{color:var(--sf-blue)}
.rel-tab.on{color:var(--sf-blue);border-bottom-color:var(--sf-blue);font-weight:700}
.rel-tab .cnt{color:var(--ink-3);font-weight:400;margin-left:3px}
.rel-tab.on .cnt{color:var(--sf-blue)}
.rel-panel{display:none;padding:12px 14px}
.rel-panel.on{display:block}
.rel-tools{display:flex;justify-content:flex-end;gap:6px;margin-bottom:8px}

/* Card */
.card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);
  box-shadow:var(--shadow);margin-bottom:10px}
.card-h{display:flex;align-items:center;gap:8px;padding:8px 14px;border-bottom:1px solid var(--line)}
.card-h .t{font-size:13.5px;font-weight:700;color:var(--ink)}
.card-h .n{font-size:12px;color:var(--ink-3);font-weight:400}
.card-h .r{margin-left:auto;display:flex;gap:6px}
.card-b{padding:12px 14px}

/* field grid */
.fg{display:grid;grid-template-columns:1fr 1fr;gap:2px 30px}
.fg.one{grid-template-columns:1fr}
.fld{padding:7px 0;border-bottom:1px dotted var(--line);display:flex;flex-direction:column;gap:2px}
.fld label{font-size:11px;color:var(--ink-3)}
.fld .v{font-size:13px;color:var(--ink)}
.fld .v.link{color:var(--sf-blue)}
.pencil{margin-left:6px;opacity:.4;font-size:11px}

/* table */
.tbl-wrap{overflow-x:auto}
table.tbl{width:100%;border-collapse:collapse;font-size:12.5px;min-width:520px}
.tbl th{text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:.03em;color:var(--ink-3);
  font-weight:700;padding:7px 10px;border-bottom:1px solid var(--line-2);background:var(--nav);white-space:nowrap}
.tbl td{padding:8px 10px;border-bottom:1px solid var(--line);color:var(--ink);vertical-align:middle}
.tbl tr:hover td{background:rgba(1,118,211,.04)}
.tbl .num{text-align:right;font-variant-numeric:tabular-nums}

/* pills / badges */
.pill{display:inline-flex;align-items:center;gap:5px;padding:2px 9px;border-radius:11px;
  font-size:11px;font-weight:600;background:transparent;border:1px solid currentColor}
.pill:before{content:"";width:6px;height:6px;border-radius:50%;background:currentColor}
.pill.ok{color:var(--ok)}
.pill.warn{color:var(--warn)}
.pill.err{color:var(--err)}
.pill.info{color:var(--sf-blue)}
.pill.mut{color:var(--ink-2)}

/* banner */
.banner{display:flex;gap:9px;align-items:flex-start;padding:9px 13px;border-radius:5px;
  font-size:12.5px;margin-bottom:10px;border-left:4px solid}
.banner .ic{font-weight:900;flex-shrink:0}
.banner.warn{background:var(--warn-bg);border-color:var(--warn-line);color:var(--warn)}
.banner.err{background:var(--err-bg);border-color:var(--err-line);color:var(--err)}
.banner.info{background:var(--sf-blue-l);border-color:var(--sf-blue);color:var(--sf-blue-d)}
.banner.ok{background:var(--ok-bg);border-color:var(--ok);color:var(--ok)}
.banner b{font-weight:700}

/* activity panel */
.act-tabs{display:flex;gap:2px;border-bottom:1px solid var(--line);padding:0 8px}
.act-tabs .t{padding:8px 12px;font-size:12.5px;color:var(--ink-2);border-bottom:2px solid transparent;background:none;border-top:0;border-left:0;border-right:0;font-weight:600}
.act-tabs .t:hover{color:var(--sf-blue)}
.act-tabs .t.on{color:var(--sf-blue);border-bottom-color:var(--sf-blue);font-weight:700}
.act-actions{display:flex;gap:6px;flex-wrap:wrap;padding:12px 14px 0}
.ca{border:1px solid var(--line-2);background:var(--card);color:var(--ink-2);border-radius:4px;
  padding:5px 10px;font-size:12px;display:flex;align-items:center;gap:6px;cursor:pointer}
.ca svg{width:14px;height:14px}
.ca:hover{background:var(--sf-blue-l);color:var(--sf-blue)}
.ca.on{border-color:var(--sf-blue);color:var(--sf-blue);background:var(--sf-blue-l);font-weight:600}
.composer{border:1px solid var(--line-2);border-radius:5px;padding:9px 11px;color:var(--ink-3);
  margin:10px 14px 6px;font-size:12.5px;display:flex;justify-content:space-between;align-items:center;gap:10px}
.composer .composer-btn{color:var(--sf-blue);font-weight:700;font-size:12px;white-space:nowrap;cursor:pointer}
.act-filter{display:flex;justify-content:space-between;align-items:center;padding:8px 14px;
  border-top:1px solid var(--line);font-size:11.5px;color:var(--ink-3)}
.act-filter b{color:var(--ink)}
.tl-group{font-size:11px;text-transform:uppercase;letter-spacing:.04em;color:var(--ink-3);
  font-weight:700;padding:12px 14px 4px;background:var(--nav);border-top:1px solid var(--line);border-bottom:1px solid var(--line)}
.tl-empty{font-size:11.5px;color:var(--ink-3);padding:8px 14px 10px}
.timeline{padding:0 0 6px}
.tl-item{display:flex;gap:10px;padding:10px 14px;border-bottom:1px solid var(--line);align-items:flex-start}
.tl-item:hover{background:rgba(1,118,211,.03)}
.tl-check{width:15px;height:15px;border:1px solid var(--line-2);border-radius:3px;margin-top:6px;
  flex-shrink:0;position:relative;cursor:pointer}
.tl-check.done{background:var(--ok);border-color:var(--ok)}
.tl-check.done:after{content:"✓";position:absolute;inset:0;color:#fff;font-size:11px;line-height:14px;text-align:center}
.tl-dot{width:28px;height:28px;border-radius:50%;background:var(--sf-blue-l);color:var(--sf-blue);
  display:grid;place-items:center;flex-shrink:0}
.tl-dot svg{width:15px;height:15px}
.tl-item .m{flex:1;min-width:0}
.tl-item .m .h{font-size:12.5px;color:var(--ink);font-weight:600;display:flex;justify-content:space-between;gap:8px}
.tl-item .m .h .date{font-weight:400;color:var(--ink-3);font-size:11px;white-space:nowrap}
.tl-item .m .s{font-size:11.5px;color:var(--ink-3);margin-top:2px}

/* progress */
.prog{height:8px;background:var(--line);border-radius:5px;overflow:hidden}
.prog i{display:block;height:100%;background:var(--ok);border-radius:5px}
.prog.blue i{background:var(--sf-blue)}

/* KPI tiles */
.kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:10px}
@media(max-width:1000px){.kpis{grid-template-columns:repeat(2,1fr)}}
.kpi{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);
  padding:12px 14px;box-shadow:var(--shadow)}
.kpi .lab{font-size:11px;color:var(--ink-3);text-transform:uppercase;letter-spacing:.03em}
.kpi .big{font-size:26px;font-weight:300;margin:3px 0;font-variant-numeric:tabular-nums}
.kpi .d{font-size:11px}
.kpi .d.up{color:var(--ok)} .kpi .d.dn{color:var(--err)}

/* app launcher modal */
.launcher{background:var(--card);border-radius:8px;box-shadow:0 4px 20px rgba(0,0,0,.25);
  border:1px solid var(--line);padding:18px 20px;margin-bottom:12px}
.launcher h3{margin:0 0 12px;font-size:13px;color:var(--ink-3);text-transform:uppercase;letter-spacing:.05em}
.tiles{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px}
.tile{border:1px solid var(--line);border-radius:6px;padding:12px;display:flex;gap:10px;align-items:center;background:var(--card)}
.tile:hover{border-color:var(--sf-blue);background:#f4f8fd}
.tile .ti{width:34px;height:34px;border-radius:6px;display:grid;place-items:center;color:#fff;flex-shrink:0;font-size:16px}
.tile b{font-size:13px;display:block;color:var(--ink)}
.tile span{font-size:11px;color:var(--ink-3)}

.note{font-size:11px;color:var(--ink-3);font-style:italic;margin:2px 2px 12px}
.chart{display:flex;align-items:flex-end;gap:8px;height:120px;padding:6px 2px 0}
.chart .bar{flex:1;background:var(--sf-blue);border-radius:3px 3px 0 0;position:relative;min-width:10px}
.chart .bar.plan{background:var(--line-2)}
.chart .bar span{position:absolute;bottom:-17px;left:0;right:0;text-align:center;font-size:10px;color:var(--ink-3)}
.legend{display:flex;gap:16px;font-size:11px;color:var(--ink-2);margin-top:22px}
.legend i{display:inline-block;width:10px;height:10px;border-radius:2px;margin-right:5px;vertical-align:middle}

/* interactivity affordances */
.stage{cursor:pointer}
.v.link,[data-go]{cursor:pointer}
[data-go]:hover{text-decoration:underline}
.crumb [data-go]{color:var(--sf-blue);font-weight:600}
.tbl a[data-go]{cursor:pointer}
/* toast */
#toast{position:fixed;top:64px;left:50%;transform:translateX(-50%) translateY(-14px);
  z-index:200;opacity:0;pointer-events:none;transition:opacity .2s,transform .2s}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast-in{background:var(--ok);color:#fff;padding:9px 18px;border-radius:6px;font-size:13px;
  font-weight:600;box-shadow:0 6px 20px rgba(0,0,0,.28);display:flex;align-items:center;gap:8px}
@media(prefers-reduced-motion:reduce){#toast{transition:none}}

/* ---------- List View ---------- */
.lv-top{display:flex;align-items:center;gap:12px;background:var(--card);border:1px solid var(--line);
  border-radius:var(--radius) var(--radius) 0 0;padding:9px 14px;box-shadow:var(--shadow)}
.lv-title{display:flex;flex-direction:column;line-height:1.25}
.lv-obj{font-size:11px;color:var(--ink-3)}
.lv-view{font-size:18px;color:var(--ink);font-weight:400}
.lv-meta{font-size:11px;color:var(--ink-3)}
.lv-tools{display:flex;align-items:center;gap:10px;background:var(--card);
  border:1px solid var(--line);border-top:0;padding:6px 14px}
.lv-search{border:1px solid var(--line-2);border-radius:15px;padding:4px 12px;font-size:12px;
  color:var(--ink-3);min-width:220px}
.lv-icons{margin-left:auto;color:var(--ink-3);letter-spacing:6px;font-size:14px}
.card.lv-body{border-radius:0 0 var(--radius) var(--radius);margin-top:0;border-top:0}
.tbl a[data-go]{color:var(--sf-blue);font-weight:600}
.tbl input[type=checkbox]{accent-color:var(--sf-blue)}

/* ===== WIREFRAME LOW-FI MODE ===== */
#app.wire{
  --ink:#3a3a3a; --ink-2:#6b6b6b; --ink-3:#9b9b9b;
  --bg:#f4f4f4; --card:#ffffff; --line:#cfcfcf; --line-2:#bcbcbc;
  --sf-blue:#5c5c5c; --sf-blue-d:#3a3a3a; --sf-blue-l:#ededed;
  --ok:#5f5f5f; --ok-bg:#f0f0f0; --warn:#5f5f5f; --warn-bg:#f0f0f0; --warn-line:#c4c4c4;
  --err:#404040; --err-bg:#ededed; --err-line:#c4c4c4;
  --path-todo:#e6e6e6; --path-done:#9b9b9b; --path-current:#5f5f5f;
  --nav:#f7f7f7; --shadow:none;
}
#app.wire *{box-shadow:none !important}
#app.wire .g-header{background:#eaeaea;border-bottom:1px solid var(--line)}
#app.wire .g-header .g-ico,#app.wire .g-burger,#app.wire .g-fav,#app.wire .g-gear,#app.wire .g-help{color:#3a3a3a}
#app.wire .g-search{border:1px solid var(--line)}
#app.wire .waffle span{background:#6b6b6b}
#app.wire .g-avatar{background:#dcdcdc;color:#3a3a3a}
#app.wire .notif-badge{background:#6b6b6b !important;border-color:#eaeaea}
#app.wire .notif-item.unread{background:#f2f2f2}
/* icon/placeholder -> khối xám, emoji desaturate */
#app.wire .hl-ico,#app.wire .ti,#app.wire .sr-ico,#app.wire .n-ico{
  background:#dadada !important;color:#4d4d4d !important;border:1px solid var(--line-2);filter:grayscale(1)}
#app.wire .tl-dot,#app.wire .waffle,#app.wire .banner .ic{filter:grayscale(1)}
/* navigator (menu ẩn) */
#app.wire .navigator,#app.wire .nav-brand{background:#3c3c3c;border-color:#555}
#app.wire .nav-hint{background:#4a4a4a;color:#e0e0e0}
#app.wire .nav-brand h1{color:#fff}
#app.wire .nav-brand p,#app.wire .nav-group,#app.wire .dept,#app.wire .ni-label{color:#c7c7c7 !important}
#app.wire .nav-item{color:#dcdcdc}
#app.wire .nav-item:hover{background:#4a4a4a}
#app.wire .nav-item.active{background:#5c5c5c;border-left-color:#bdbdbd}
#app.wire .tag{background:#5a5a5a !important;color:#e8e8e8 !important}

/* ===== SLDS CDN INTEGRATION — ép grayscale + glue ===== */
/* Desaturate token màu của SLDS (brand blue…) về thang xám */
#app.wire { filter: grayscale(1); -webkit-filter: grayscale(1); }
/* Placeholder icon (thay icon SVG có màu của SLDS) */
.wf-ico{display:inline-flex;align-items:center;justify-content:center;width:2rem;height:2rem;border-radius:.25rem;
  background:#dadada;border:1px solid #bcbcbc;color:#4d4d4d;font-size:.95rem;flex-shrink:0;filter:grayscale(1)}
.wf-ico.lg{width:3rem;height:3rem;font-size:1.35rem}
.wf-muted{color:#6b6b6b}
/* Căn phải cột số trong slds-table */
.slds-table th.num,.slds-table td.num{text-align:right;font-variant-numeric:tabular-nums}
.slds-table td.num,.slds-table th.num>.slds-truncate{text-align:right}
/* Navigation Bar (context bar) hiển thị đúng chiều cao */
.slds-context-bar{height:2.75rem !important;min-height:2.75rem;display:flex !important;align-items:stretch !important;background:#f4f4f4;border-bottom:1px solid #d8d8d8;margin-bottom:.5rem}
.slds-context-bar__primary{display:flex !important;align-items:stretch !important}
.slds-context-bar__secondary{display:flex !important;align-items:stretch !important;flex:1 1 auto}
.slds-context-bar__secondary .slds-grid{display:flex !important;align-items:stretch !important;margin:0}
.slds-context-bar__item{display:flex !important;align-items:center !important}
.slds-context-bar__label-action{display:flex !important;align-items:center !important;height:100%;padding:0 .85rem !important;color:#3a3a3a !important;text-decoration:none;white-space:nowrap}
.slds-context-bar__label-action:hover{background:#eaeaea}
.slds-context-bar .slds-is-active,.slds-context-bar .a-tab.on{box-shadow:inset 0 -3px 0 #5c5c5c;background:#ececec}
.slds-context-bar .slds-is-active .slds-context-bar__label-action,.slds-context-bar .a-tab.on{font-weight:700}
/* Badge: chỉ hiển thị text, bỏ nền bo tròn */
#app.wire .slds-badge{background:transparent !important;padding:0 !important;border:0 !important;color:inherit;font-weight:600;border-radius:0}
/* slds-card khoảng cách trong record 3 cột */
.cols-rec .slds-card,.rel .slds-card{margin-bottom:.5rem}
.slds-scoped-notification{margin-bottom:.5rem}
/* nút slds trong page header nhỏ gọn */
.slds-page-header .slds-button-group-list{flex-wrap:wrap}
/* List View selector (dropdown chọn nhiều list view) */
.lv-view-wrap{position:relative;display:inline-block}
.lv-view-btn{cursor:pointer;display:inline-flex;align-items:center;gap:6px}
.lv-view-btn:hover{color:#5c5c5c;text-decoration:underline}
.lv-view-menu{position:absolute;top:100%;left:0;margin-top:4px;min-width:250px;background:#fff;
  border:1px solid #cfcfcf;border-radius:6px;box-shadow:0 8px 28px rgba(0,0,0,.22);z-index:120;padding:6px 0}
.lv-view-menu[hidden]{display:none}
.lv-view-head{font-size:10.5px;font-weight:700;letter-spacing:.04em;color:#9b9b9b;padding:6px 14px 4px}
.lv-view-item{display:block;width:100%;text-align:left;border:0;background:none;font-family:inherit;
  font-size:13px;color:#3a3a3a;padding:7px 14px;cursor:pointer}
.lv-view-item:hover{background:#f0f0f0}
.lv-view-item.on{font-weight:700}
.lv-view-item.on:before{content:"✓ ";color:#5c5c5c}
.lv-view-sep{height:1px;background:#e5e5e5;margin:5px 0}
.lv-view-manage{color:#6b6b6b}
/* List View toolbar: search + controls (chuẩn SF) */
.lv-toolbar{display:flex;align-items:center;justify-content:flex-end;padding:8px 12px;border-bottom:1px solid var(--line)}
.lv-search-box{width:320px;max-width:100%;display:flex;align-items:center;gap:7px;border:1px solid var(--line-2);
  border-radius:16px;padding:5px 13px;background:var(--card)}
.lv-search-box input{border:0;outline:none;background:transparent;font-size:12.5px;flex:1;font-family:inherit;color:var(--ink)}
.lv-search-box input::placeholder{color:var(--ink-3)}
</style>
</head>
<body>

<div class="app nav-hidden wire" id="app">
  <nav class="navigator" id="nav"></nav>
  <div class="backdrop" onclick="toggleNav()"></div>
  <div class="sf">
    <!-- Global header -->
    <header class="g-header">
      <button class="g-burger" title="Ẩn/hiện danh sách màn hình (demo)" onclick="toggleNav()">☰</button>
      <div class="g-spacer"></div>
      <div class="g-search">
        <svg width="14" height="14" viewBox="0 0 20 20" fill="none"><circle cx="8" cy="8" r="6" stroke="#747474" stroke-width="2"/><path d="M13 13l5 5" stroke="#747474" stroke-width="2"/></svg>
        <input id="gsearch" type="text" autocomplete="off" placeholder="Tìm kiếm...">
        <div id="search-dd"></div>
      </div>
      <div class="g-spacer"></div>
      <div class="g-icons">
        <span class="g-ico g-gear" title="Thiết lập (Setup)">⚙</span>
        <span class="g-ico g-help" title="Trợ giúp">?</span>
        <div class="g-notif">
          <button class="g-ico g-bell" title="Thông báo" onclick="toggleNotif(event)">🔔<span class="notif-badge" id="notif-badge"></span></button>
          <div class="notif-panel" id="notif-panel">
            <div class="notif-head"><span>Thông báo</span><button class="notif-clear" onclick="clearNotif(event)">Đánh dấu đã đọc</button></div>
            <div class="notif-list" id="notif-list"></div>
          </div>
        </div>
        <span class="g-avatar" title="Hồ sơ người dùng">ĐT</span>
      </div>
    </header>
    <div id="screen"></div>
  </div>

  <!-- App Launcher modal -->
  <div class="modal-back" id="mback" onclick="closeLauncher()"></div>
  <div class="launcher-modal" id="lmodal">
    <div class="lm-head">
      <h3>App Launcher</h3>
      <input class="lm-search" id="lmsearch" type="text" autocomplete="off" placeholder="🔍 Tìm ứng dụng & mục…">
    </div>
    <div class="lm-body" id="lmbody"></div>
  </div>
  <!-- Modal tạo PO từ danh sách hàng cần mua -->
  <div class="modal-back" id="pomback" onclick="closePO()"></div>
  <div class="po-modal" id="pomodal">
    <div class="pm-head"><h3>Tạo Đơn mua hàng (PO)</h3><button title="Đóng" onclick="closePO()">✕</button></div>
    <div class="pm-body" id="pm-body"></div>
    <div class="pm-foot" id="pm-foot"></div>
  </div>
  <!-- Modal mass assign người mua cho dòng PR -->
  <div class="modal-back" id="massback" onclick="closeMass()"></div>
  <div class="po-modal sm" id="massmodal">
    <div class="pm-head"><h3>Gán người mua (Mass Assign)</h3><button title="Đóng" onclick="closeMass()">✕</button></div>
    <div class="pm-body" id="mass-body"></div>
    <div class="pm-foot"><div class="pm-actions"><button class="btn" onclick="closeMass()">Hủy</button><button class="btn pri" onclick="confirmMass()">Gán</button></div></div>
  </div>
  <!-- Modal thêm mới nhà cung cấp -->
  <div class="modal-back" id="supback" onclick="closeSupModal()" style="z-index:135"></div>
  <div class="po-modal sm" id="supmodal" style="z-index:140">
    <div class="pm-head"><h3>Thêm mới nhà cung cấp</h3><button title="Đóng" onclick="closeSupModal()">✕</button></div>
    <div class="pm-body" id="sup-body"></div>
    <div class="pm-foot"><div class="pm-actions"><button class="btn" onclick="closeSupModal()">Hủy</button><button class="btn pri" onclick="confirmAddSupplier()">Thêm</button></div></div>
  </div>
</div>

<script>
/* ============ helpers ============ */
const el = (h)=>{const t=document.createElement('template');t.innerHTML=h.trim();return t.content.firstElementChild;};

/* apps for App Launcher + Home  [name, color, icon, targetScreen] */
const APPS=[
 ['Bán hàng nội địa','#0176d3','🧾','opp_list'],
 ['Bán hàng xuất khẩu','#1b96ff','🚢','exquote_list'],
 ['Mua hàng','#2e844a','🛒','pr_list'],
 ['Mua nhập khẩu','#0b827c','🌐','matinv'],
 ['Chăm sóc KH','#e07a00','🎧','case_list'],
 ['Dữ liệu nền tảng','#5867e8','🗂','pricebook_list'],
 ['Báo cáo & Dashboard','#ba0517','📊','reports'],
 ['Quản trị hệ thống','#747474','⚙','master']];
const GROUPICON={'Tổng quan':['🏠','#747474'],'Dữ liệu nền tảng':['🗂','#5867e8'],
 'Bán hàng nội địa':['🧾','#0176d3'],'Bán hàng xuất khẩu':['🚢','#1b96ff'],
 'Mua hàng nội địa':['🛒','#2e844a'],'Mua hàng nhập khẩu':['🌐','#0b827c'],
 'Khiếu nại':['🎧','#e07a00'],'Báo cáo':['📊','#ba0517']};
function norm(s){return (s||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/\u0111/g,'d');}
function iconFor(g){return GROUPICON[g]||['▦','#0176d3'];}
let INDEX=[]; // built after NAV defined

function appnav(app, sub, tabs, active){
  return `<div class="a-nav slds-context-bar">
    <button class="waffle nav-waffle" title="App Launcher" onclick="openLauncher()"><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span></button>
    <div class="slds-context-bar__primary a-app">
      <div class="slds-context-bar__item"><span class="slds-context-bar__label-action"><b>${app}</b>${sub?` <span class="wf-muted slds-m-left_xx-small">· ${sub}</span>`:''}</span></div>
    </div>
    <nav class="slds-context-bar__secondary"><ul class="slds-grid">
      ${tabs.map(t=>`<li class="slds-context-bar__item ${t===active?'slds-is-active':''}"><a class="a-tab slds-context-bar__label-action ${t===active?'on':''}">${t}</a></li>`).join('')}
    </ul></nav>
  </div>`;
}
function hl({crumb,ico,color,title,sub,fields,actions}){
  return `<div class="slds-page-header slds-page-header_record-home">
    <div class="slds-page-header__row">
      <div class="slds-page-header__col-title">
        <div class="slds-media">
          <div class="slds-media__figure"><span class="wf-ico lg">${ico||'▦'}</span></div>
          <div class="slds-media__body">
            <div class="crumb">${crumb||''}</div>
            <h1 class="slds-page-header__title slds-truncate" title="${(title||'').replace(/<[^>]+>/g,'')}">${title}</h1>
          </div>
        </div>

// Phân bổ FIFO: mỗi split lấy SL từ phiếu cũ tính dần lên phiếu mới
function allocate(g){
  const breaks=g.prBreak.map(x=>({pr:x.pr, rem:x.qty}));
  return g.splits.map(s=>{
    let need=parseNum(s.qty); const cover=[];
    for(const b of breaks){ if(need<=0) break; if(b.rem<=0) continue;
      const take=Math.min(b.rem,need); cover.push({pr:b.pr,qty:take}); b.rem-=take; need-=take; }
    return cover;
  });
}
function renderPOStage(){
  const opts=(cur)=>`<option value="">— Chọn NCC —</option>`+SUPPLIERS.map(s=>`<option value="${s.name}" ${s.name===cur?'selected':''}>${s.name} — ${s.price} ₫ · ${scoreLabel(s)}</option>`).join('');
  let rows='';
  PODRAFT.forEach((g,gi)=>{
    const allocs=allocate(g);
    g.splits.forEach((s,si)=>{
      const cover=allocs[si].map(c=>`${c.pr} (${fmtN(c.qty)})`).join(', ')||'<span class="wf-muted">—</span>';
      rows+=`<tr>

        <td>${si===0?g.product:`<span class="wf-muted">↳ ${g.product}</span>`}</td>

        <td>${g.unit}</td>
        <td>${cover}</td>
        <td><div class="po-supcell"><select onchange="setSplitSup(${gi},${si},this.value)">${opts(s.supplier)}</select><button class="btn sm po-newsup" title="Thêm NCC mới cho sản phẩm này" onclick="openSupModal(${gi},${si})">＋ NCC</button></div></td>
        <td class="num">${s.price?`${s.price} ₫`:'—'}</td>
      </tr>`;
    });
  });
  document.getElementById('pm-body').innerHTML=
    `<table class="tbl po-stage"><thead><tr><th style="width:62px"></th><th>Sản phẩm</th><th class="num">Số lượng</th><th>Đơn vị</th><th>Phiếu yêu cầu (phân bổ)</th><th>Nhà cung cấp</th><th class="num">Đơn giá</th></tr></thead>
     <tbody>${rows}</tbody></table>`;
  renderPOSummary();
}
function setSplitQty(gi,si,v){
  const g=PODRAFT[gi]; const n=g.splits.length;
  let val=parseNum(v); if(val<0) val=0;
  if(n<=1){ if(val>g.total) val=g.total; g.splits[si].qty=val; renderPOStage(); return; }
  if(si===n-1){
    // chỉnh dòng cuối -> điều chỉnh dòng kế cuối; giữ các dòng còn lại
    const fixed=g.splits.reduce((a,s,i)=> (i===si||i===si-1)?a:a+parseNum(s.qty),0);
    const cap=g.total-fixed; if(val>cap) val=cap;
    g.splits[si].qty=val; g.splits[si-1].qty=g.total-fixed-val;
  } else {
    // giữ các dòng TRÊN (0..si-1); các dòng DƯỚI (si+1..cuối) tính lại theo tỉ lệ
    const above=g.splits.reduce((a,s,i)=> i<si ? a+parseNum(s.qty):a, 0);
    const cap=g.total-above; if(val>cap) val=cap;
    g.splits[si].qty=val;
    let remaining=g.total-above-val;
    const below=[]; for(let i=si+1;i<n;i++) below.push(i);
    const cur=below.map(i=>parseNum(g.splits[i].qty)); const curSum=cur.reduce((a,b)=>a+b,0);
    let assigned=0;
    below.forEach((idx,k)=>{
      let q;
      if(k===below.length-1){ q=remaining-assigned; }
      else { q = curSum>0 ? Math.round(remaining*cur[k]/curSum) : Math.round(remaining/below.length); assigned+=q; }
      g.splits[idx].qty=Math.max(0,q);
    });
  }
  renderPOStage();
}
function setSplitSup(gi,si,v){ const s=SUPPLIERS.find(x=>x.name===v); PODRAFT[gi].splits[si].supplier=v; PODRAFT[gi].splits[si].price=s?s.price:''; renderPOStage(); }
function addSplit(gi){ const g=PODRAFT[gi]; const last=g.splits[g.splits.length-1]; const q=parseNum(last.qty); const h=Math.floor(q/2); last.qty=q-h; g.splits.push({supplier:'',qty:h,price:''}); renderPOStage(); }
function removeSplit(gi,si){
  const g=PODRAFT[gi];
  if(g.splits.length>1){
    const removedQ=parseNum(g.splits[si].qty);
    g.splits.splice(si,1);
    const last=g.splits[g.splits.length-1]; last.qty=parseNum(last.qty)+removedQ; // dồn để tổng vẫn = total
  } else { PODRAFT.splice(gi,1); }
  if(!PODRAFT.length){ closePO(); toast('Đã bỏ hết sản phẩm — huỷ tạo PO'); return; }
  renderPOStage();
}

function confirmAddSupplier(){

  SUP_CTX=null;
  closeSupModal(); renderPOStage();

}
function renderPOSummary(){
  const groups={}; let totalSplits=0, assigned=0, fullyAlloc=true;
  PODRAFT.forEach(g=>{
    const allocs=allocate(g);
    const sum=g.splits.reduce((a,s)=>a+parseNum(s.qty),0);
    if(sum!==g.total) fullyAlloc=false;
    g.splits.forEach((s,si)=>{ totalSplits++;
      if(s.supplier){ assigned++; (groups[s.supplier]=groups[s.supplier]||[]).push({product:g.product,unit:g.unit,qty:parseNum(s.qty),price:s.price,cover:allocs[si]}); }
    });
  });
  const sups=Object.keys(groups);
  let html='';
  if(!sups.length){
    html='';
  } else {
    html=`<div class="po-sum-h">Sẽ tạo <b>${sups.length} PO</b> · ${assigned}/${totalSplits} dòng đã gán NCC${fullyAlloc?'':' · <span style="color:var(--err)">còn sản phẩm chưa phân bổ đủ SL</span>'}</div>`;
    html+=sups.map((s,k)=>`<div class="po-card"><div class="po-card-h">PO ${k+1} — <b>${s}</b> <span>· ${groups[s].length} dòng</span></div>
      ${groups[s].map(l=>`<div class="po-line"><span>${l.product} <span style="color:var(--ink-3)">(${l.cover.map(c=>c.pr+' '+fmtN(c.qty)).join(', ')||'—'})</span></span><span>${fmtN(l.qty)} ${l.unit}${l.price&&l.price!=='—'?` · ${l.price} ₫`:''}</span></div>`).join('')}</div>`).join('');
  }
  const ready = sups.length>0 && assigned===totalSplits && fullyAlloc;
  document.getElementById('pm-foot').innerHTML = html +
    `<div class="pm-actions"><button class="btn" onclick="closePO()">Hủy</button>
     <button class="btn pri" ${ready?'':'disabled'} onclick="confirmPO()">Tạo ${sups.length||''} PO</button></div>`;
}
function confirmPO(){
  const sups=[...new Set(PODRAFT.flatMap(g=>g.splits.filter(s=>s.supplier).map(s=>s.supplier)))];
  const lines=PODRAFT.reduce((a,g)=>a+g.splits.filter(s=>s.supplier).length,0);
  closePO();

}

      <div class="slds-page-header__col-title"><div class="slds-media">
        <div class="slds-media__figure"><span class="wf-ico lg">${ico||'▦'}</span></div>
        <div class="slds-media__body">
          <div class="wf-muted" style="font-size:.75rem">${object}</div>
          <div class="lv-view-wrap">
            <h1 class="slds-page-header__title slds-truncate lv-view-btn" title="Đổi list view" onclick="toggleViewMenu(event)">${cur} <span style="font-size:.7em">▾</span></h1>
            <div class="lv-view-menu" hidden>
              <div class="lv-view-head">DANH SÁCH (LIST VIEWS)</div>
              ${vlist.map(v=>`<button class="lv-view-item${v===cur?' on':''}" onclick="pickView(event,this)">${v}</button>`).join('')}
              <div class="lv-view-sep"></div>
              <button class="lv-view-item lv-view-manage">⚙ Quản lý list view…</button>
            </div>
          </div>
        </div>
      </div></div>
      <div class="slds-page-header__col-actions"><div class="slds-page-header__controls"><div class="slds-page-header__control" style="display:flex;align-items:center;gap:8px">
        ${bulk?`<span id="lv-selcount" class="wf-muted" style="font-size:12px"></span>${bulk.map(b=>`<button class="slds-button slds-button_neutral lv-bulk-btn" onclick="${b.fn}" disabled>${b.label}</button>`).join('')}`:''}
        ${newLabel?`<ul class="slds-button-group-list"><li><button class="slds-button slds-button_brand">${newLabel}</button></li></ul>`:''}
      </div></div></div>
    </div>
    <div class="slds-page-header__row"><p class="slds-page-header__meta-text wf-muted">${count||rows.length} mục · Cập nhật vài giây trước</p></div>

/* ============ router ============ */
function buildNav(){
  const wrap = document.getElementById('nav');
  wrap.innerHTML = `<div class="nav-brand"><h1>Prototype CRM Đồng Tiến</h1><p>Salesforce · demo theo quy trình</p></div>`
   + NAV.map(grp=>`<div class="nav-group">${grp.g}</div>`
     + grp.items.map(it=>{const tag=it[3]||'';return `<button class="nav-item ${tag==='record'?'sub':''}" data-id="${it[0]}" onclick="go('${it[0]}')">
        <span class="ni-row"><span class="ni-label">${it[1]}</span>${tag?`<span class="tag t-${tag}">${TAGLABEL[tag]}</span>`:''}</span>
        ${it[2]?`<span class="dept">${it[2]}</span>`:''}</button>`;}).join('')).join('');
}
function buildRecordLayout(root){
  root.querySelectorAll('.cols-side').forEach(cs=>{
    const kids=Array.from(cs.children);
    if(kids.length<2) return;
    const leftWrap=kids[0], rightCol=kids[1];
    const cards=Array.from(leftWrap.children).filter(el=>el.classList&&el.classList.contains('slds-card'));
    if(cards.length<1) return;
    const wide=cs.classList.contains('wide'); // không cột detail, tabs bung rộng
    // Detail = card chứa form (.slds-form); nếu không có thì lấy card đầu
    let detail, related;
    if(wide){ detail=null; related=cards; }
    else { let di=cards.findIndex(c=>c.querySelector('.slds-form')); if(di<0) di=0; detail=cards[di]; related=cards.filter((_,i)=>i!==di); }
    cs.classList.remove('cols-side'); cs.classList.add('cols-rec'); if(wide) cs.classList.add('wide');
    cs.innerHTML='';
    // Cột trái: Detail (bỏ nếu wide)
    if(detail){ const c1=document.createElement('div'); c1.className='rec-col'; c1.appendChild(detail); cs.appendChild(c1); }
    // Cột giữa: các related list dạng tab
    if(related.length){
      const c2=document.createElement('div'); c2.className='rec-col';
      const rel=document.createElement('div'); rel.className='rel';
      const tabs=document.createElement('div'); tabs.className='rel-tabs';
      const panels=document.createElement('div');
      related.forEach((cd,i)=>{
        const tEl=cd.querySelector('.card-title'), nEl=cd.querySelector('.card-count'), rEl=cd.querySelector('.card-action');
        const bEl=cd.querySelector('.card-body');
        const btn=document.createElement('button');
        btn.className='rel-tab'+(i===0?' on':'');
        btn.innerHTML=(tEl?tEl.textContent:('Danh sách '+(i+1)))+(nEl?` <span class="cnt">${nEl.textContent}</span>`:'');
        tabs.appendChild(btn);
        const panel=document.createElement('div'); panel.className='rel-panel'+(i===0?' on':'');
        if(rEl){ const tools=document.createElement('div'); tools.className='rel-tools'; tools.appendChild(rEl); panel.appendChild(tools); }
        if(bEl){ while(bEl.firstChild) panel.appendChild(bEl.firstChild); }
        panels.appendChild(panel);
      });
      rel.appendChild(tabs); rel.appendChild(panels); c2.appendChild(rel); cs.appendChild(c2);
    } else { cs.classList.add('no-rel'); }
    // Cột phải: Activity
    const c3=document.createElement('div'); c3.className='rec-col'; c3.appendChild(rightCol); cs.appendChild(c3);
  });
}
function go(id){
  document.getElementById('screen').innerHTML = (S[id]||S.home)();
  buildRecordLayout(document.getElementById('screen'));
  document.querySelectorAll('.nav-item').forEach(b=>b.classList.toggle('active', b.dataset.id===id));
  const body=document.querySelector('.sf-body'); if(body) body.scrollTop=0;
  if(matchMedia('(max-width:820px)').matches) document.getElementById('app').classList.add('nav-hidden');
}
function toggleNav(){ document.getElementById('app').classList.toggle('nav-hidden'); }

/* ---- App Launcher ---- */
function openLauncher(){
  document.getElementById('mback').classList.add('show');
  document.getElementById('lmodal').classList.add('show');
  renderLauncher('');
  const i=document.getElementById('lmsearch'); i.value=''; i.focus();
}
function closeLauncher(){
  document.getElementById('mback').classList.remove('show');
  document.getElementById('lmodal').classList.remove('show');
}
function renderLauncher(q){
  const nq=norm(q);
  const apps=APPS.filter(a=>!nq||norm(a[0]).includes(nq));
  const items=INDEX.filter(it=>!nq||norm(it.label).includes(nq)||norm(it.group).includes(nq)||norm(it.dept).includes(nq));
  document.getElementById('lmbody').innerHTML=
   `<div class="lm-sec">Ứng dụng (${apps.length})</div>
    <div class="tiles">${apps.map(a=>`<button class="tile" onclick="closeLauncher();go('${a[3]}')"><span class="ti" style="background:${a[1]}">${a[2]}</span><span><b>${a[0]}</b><span>Mở ứng dụng</span></span></button>`).join('')||'<div class="note">Không có ứng dụng khớp</div>'}</div>
    <div class="lm-sec" style="margin-top:18px">Tất cả mục (${items.length})</div>
    <div class="lm-items">${items.map(it=>{const ic=iconFor(it.group);
      return `<button class="lm-item" onclick="closeLauncher();go('${it.id}')"><span class="sr-ico" style="background:${ic[1]}">${ic[0]}</span><span>${it.label}</span><span class="g">${it.group}${it.tag?' · '+(TAGLABEL[it.tag]||''):''}</span></button>`;}).join('')||'<div class="note">Không có mục khớp</div>'}</div>`;
}

/* ---- Global search ---- */
function doSearch(q){
  const dd=document.getElementById('search-dd'); const nq=norm(q);
  if(!nq){ dd.classList.remove('show'); dd.innerHTML=''; return; }
  const res=INDEX.filter(it=>norm(it.label).includes(nq)||norm(it.group).includes(nq)||norm(it.dept).includes(nq)).slice(0,12);
  dd.innerHTML = `<div class="sr-head">Kết quả (${res.length})</div>` + (res.length
     ? res.map((it,i)=>{const ic=iconFor(it.group);
        return `<div class="sr-item ${i===0?'active':''}" data-id="${it.id}"><span class="sr-ico" style="background:${ic[1]}">${ic[0]}</span><span><div class="sr-t">${it.label}</div><div class="sr-s">${it.group}${it.tag?' · '+(TAGLABEL[it.tag]||''):''}</div></span></div>`;}).join('')
     : `<div class="note" style="padding:8px 10px">Không tìm thấy “${q}”. Thử: đơn hàng, cơ hội, NCC, case…</div>`);
  dd.classList.add('show');
}
function pickSearch(id){
  const inp=document.getElementById('gsearch'); inp.value='';
  document.getElementById('search-dd').classList.remove('show');
  go(id);
}
function setupSearch(){
  const inp=document.getElementById('gsearch'); const dd=document.getElementById('search-dd');
  inp.addEventListener('input',e=>doSearch(e.target.value));
  inp.addEventListener('focus',e=>{ if(e.target.value) doSearch(e.target.value); });
  inp.addEventListener('keydown',e=>{
    const items=[...dd.querySelectorAll('.sr-item')]; if(!items.length) return;
    let idx=items.findIndex(x=>x.classList.contains('active'));
    if(e.key==='ArrowDown'){e.preventDefault(); idx=Math.min(idx+1,items.length-1);}
    else if(e.key==='ArrowUp'){e.preventDefault(); idx=Math.max(idx-1,0);}
    else if(e.key==='Enter'){e.preventDefault(); if(items[idx]) pickSearch(items[idx].dataset.id); return;}
    else if(e.key==='Escape'){dd.classList.remove('show'); return;}
    items.forEach(x=>x.classList.remove('active')); if(items[idx]) items[idx].classList.add('active');
  });
  dd.addEventListener('click',e=>{const it=e.target.closest('.sr-item'); if(it) pickSearch(it.dataset.id);});
  document.addEventListener('click',e=>{ if(!e.target.closest('.g-search')) dd.classList.remove('show'); });
  document.getElementById('lmsearch').addEventListener('input',e=>renderLauncher(e.target.value));
  document.addEventListener('keydown',e=>{ if(e.key==='Escape'){ closeSupModal(); closeMass(); closePO(); closeLauncher(); } });
}

 'NCC':'vendor_list','Case':'case_list','Báo cáo':'reports','Dashboard':'reports','Cảnh báo':'reports',

 'Thanh toán':'lc','Phiếu yêu cầu':'pr_list','Đơn mua (PO)':'ppo_list','Kế hoạch NVL':'matinv',
 'Shipment':'shipment_list','Knowledge':'case_list'};
function resolveTab(app,label){
  if(label==='Sales Contract') return app.includes('nhập khẩu')?'imcontract_list':'excontract_list';
  return TAB2ID[label];
}
function toast(msg){
  let t=document.getElementById('toast');
  if(!t){t=el('<div id="toast"></div>');document.body.appendChild(t);}
  t.innerHTML=`<div class="toast-in"><span>✓</span><span>${msg}</span></div>`;
  t.classList.add('show'); clearTimeout(window._tt);
  window._tt=setTimeout(()=>t.classList.remove('show'),2300);
}
function setupClicks(){
  const scr=document.getElementById('screen');
  scr.addEventListener('click',e=>{
    // 1) cross-navigation links
    const link=e.target.closest('[data-go]');
    if(link){ go(link.dataset.go); return; }
    // 2) app tabs -> open related screen
    const tab=e.target.closest('.a-tab');
    if(tab){
      const app=tab.closest('.a-nav').querySelector('.a-app b').textContent;
      const id=resolveTab(app, tab.textContent.trim());
      if(id && S[id]) return go(id);
      tab.parentElement.querySelectorAll('.a-tab').forEach(x=>x.classList.remove('on'));
      tab.classList.add('on'); return;
    }
    // 3) Path stage -> chỉ CHỌN (preview), chưa áp dụng
    const st=e.target.closest('.stage');
    if(st){
      const stages=[...st.parentElement.children];
      stages.forEach(s=>s.classList.remove('sel'));
      st.classList.add('sel');
      const pb=st.closest('.path').querySelector('.path-btn');
      const cur=stages.findIndex(s=>s.classList.contains('cur'));
      const sel=stages.indexOf(st);
      pb.textContent = (sel===cur) ? '✓ Đánh dấu hoàn tất' : '✓ Đánh dấu giai đoạn này';
      return;
    }
    // 4) "Đánh dấu hoàn tất" -> áp dụng giai đoạn vừa chọn làm hiện tại
    const pb=e.target.closest('.path-btn');
    if(pb){
      const stages=[...pb.closest('.path').querySelector('.path-stages').children];
      const cur=stages.findIndex(s=>s.classList.contains('cur'));
      const sel=stages.findIndex(s=>s.classList.contains('sel'));
      let target = (sel>-1 && sel!==cur) ? sel : Math.min(cur+1, stages.length-1);
      stages.forEach((s,k)=>{ s.classList.remove('sel');
        s.classList.toggle('done',k<target); s.classList.toggle('cur',k===target); });
      pb.textContent='✓ Đánh dấu hoàn tất';
      toast('Giai đoạn hiện tại: '+stages[target].textContent.trim());
      return;
    }
    // 5) Activity / detail tabs
    const at=e.target.closest('.act-tabs .t');
    if(at){ at.parentElement.querySelectorAll('.t').forEach(x=>x.classList.remove('on')); at.classList.add('on'); return; }
    // 5a) nút soạn thảo (Cuộc gọi / Công việc / Sự kiện / Email)
    const ca=e.target.closest('.ca');
    if(ca){ ca.parentElement.querySelectorAll('.ca').forEach(x=>x.classList.remove('on')); ca.classList.add('on');
      const comp=ca.closest('.act').querySelector('.composer span'); if(comp&&ca.dataset.ph) comp.textContent=ca.dataset.ph; return; }
    // 5a2) tick hoàn tất công việc
    const chk=e.target.closest('.tl-check');
    if(chk && chk.style.visibility!=='hidden'){ chk.classList.toggle('done'); toast(chk.classList.contains('done')?'Đã đánh dấu hoàn tất':'Đã bỏ đánh dấu'); return; }
    // 5a3) nút Lưu trong composer
    const cb=e.target.closest('.composer-btn'); if(cb){ toast('Đã lưu hoạt động'); return; }
    // 5b) Related list tabs (cột giữa)
    const rt=e.target.closest('.rel-tab');
    if(rt){
      const rel=rt.closest('.rel');
      const idx=[...rt.parentElement.children].indexOf(rt);
      rel.querySelectorAll('.rel-tab').forEach(x=>x.classList.remove('on'));
      rt.classList.add('on');
      rel.querySelectorAll('.rel-panel').forEach((p,i)=>p.classList.toggle('on',i===idx));
      return;
    }
    // 6) action buttons -> toast (bỏ qua nút có onclick riêng)
    const btn=e.target.closest('.slds-button, .btn');
    if(btn){ if(btn.hasAttribute('onclick')) return; toast('“'+btn.textContent.trim()+'” — thao tác demo'); return; }
  });
}

/* List View selector */
/* List View: chọn nhiều dòng + hành động hàng loạt */
function lvSel(){
  const boxes=[...document.querySelectorAll('.lv-row')];
  const n=boxes.filter(b=>b.checked).length;
  document.querySelectorAll('.lv-bulk-btn').forEach(b=>b.disabled=n===0);
  const c=document.getElementById('lv-selcount'); if(c) c.textContent = n?`${n} mục đã chọn`:'';
  const m=document.querySelector('.lv-all'); if(m){ m.checked=n>0&&n===boxes.length; m.indeterminate=n>0&&n<boxes.length; }
}
function lvAll(m){ document.querySelectorAll('.lv-row').forEach(cb=>cb.checked=m.checked); lvSel(); }
function lvBulkApprove(){
  const rows=[...document.querySelectorAll('.lv-row:checked')].map(cb=>cb.closest('tr'));
  if(!rows.length) return;
  rows.forEach(tr=>{ const tds=tr.querySelectorAll('td'); const st=tds[tds.length-2];
    if(st) st.innerHTML='<span class="slds-badge">Đã duyệt</span>';
    const cb=tr.querySelector('.lv-row'); if(cb) cb.checked=false; });
  const n=rows.length; lvSel();
  toast(`Đã duyệt ${n} phiếu yêu cầu`);
}
function toggleViewMenu(e){
  e.stopPropagation();
  const m=e.currentTarget.parentElement.querySelector('.lv-view-menu');
  const willOpen=m.hidden;
  document.querySelectorAll('.lv-view-menu').forEach(x=>x.hidden=true);

}
function pickView(e,el){
  e.stopPropagation();
  const wrap=el.closest('.lv-view-wrap');
  if(el.classList.contains('lv-view-manage')){ toast('Quản lý list view — thao tác demo'); wrap.querySelector('.lv-view-menu').hidden=true; return; }
  const name=el.textContent.trim();
  wrap.querySelectorAll('.lv-view-item').forEach(x=>x.classList.remove('on'));
  el.classList.add('on');
  wrap.querySelector('.lv-view-btn').innerHTML=name+' <span style="font-size:.7em">▾</span>';
  wrap.querySelector('.lv-view-menu').hidden=true;
  toast('Đã chuyển sang list view: '+name);
}
